const { useState, useRef, useCallback, useMemo, useEffect } = React;

/* ── HELPERS ── */
function cleanName(f) {
  let n = f.replace(/\.[^/.]+$/, '');
  n = n.replace(/-[A-Za-z0-9_-]{16,}$/, '');
  n = n.replace(/_clipped_rev_1/gi, '').replace(/-Copy\d*/gi, '').replace(/oie_/gi, '').replace(/OIE-/gi, '');
  n = n.replace(/_/g, ' ').replace(/\./g, ' ').replace(/-+/g, ' ').replace(/\s+/g, ' ').trim();
  return n || f;
}

const ICONS = {'Mastolovi / Pjeskolovi':'🛢️','Spremnici / Tank':'💧','Separatori Ulja':'⚗️',
  'Bio Jame':'🏗️','Bio Uredjaji':'🔬','Aktivni Sklopovi':'⚙️'};

  products: images.map(img => ({ filename:img.filename, name:cleanName(img.filename), data:img.data }))
}));

function fmtBAM(v){return (v||0).toFixed(2)+' KM'}
function fmtEUR(v){return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(v||0)}

/* ── SPLASH ── */
function Splash({onDone}) {

      {sparkles.map(s=><div key={s.i} style={{position:'absolute',left:s.l+'%',top:s.t+'%',width:s.s,height:s.s,borderRadius:'50%',background:'radial-gradient(circle,rgba(167,243,208,0.9),transparent 70%)',boxShadow:'0 0 '+s.s*2+'px rgba(134,239,172,0.3)',animation:`luxSparkle ${s.dur}s ease-in-out ${s.d}s infinite`,pointerEvents:'none'}}/>)}
      {leaves.map(l=><div key={l.i} style={{position:'absolute',left:l.l+'%',top:l.t+'%',fontSize:l.s,opacity:0,animation:`luxLeafFloat ${l.dur}s ease-in-out ${l.d}s infinite`,pointerEvents:'none'}}>{l.e}</div>)}

      </div>
      <div style={{fontWeight:900,fontSize:'clamp(40px,7vw,72px)',color:'#fff',letterSpacing:16,marginTop:12,opacity:0,textShadow:'0 2px 30px rgba(134,239,172,0.2)',animation:'luxTextReveal 1s ease-out 0.5s forwards'}}>A G M</div>
      <div style={{width:0,height:1,marginTop:12,background:'linear-gradient(90deg,transparent,rgba(167,243,208,0.6),transparent)',animation:'luxLine 0.8s ease-out 0.9s forwards'}}/>
      <div style={{fontWeight:300,fontSize:'clamp(16px,3vw,26px)',color:'#a7f3d0',letterSpacing:8,marginTop:10,opacity:0,animation:'luxSubReveal 0.8s ease-out 1.1s forwards'}}>ECOSOLUTIONS</div>

/* ── MUSIC CONTROLLER ── */
function MusicPlayer() {
  const [playing,setPlaying]=useState(false);
  const [volume,setVolume]=useState(0.15);
  const audioRef=useRef(null);

  useEffect(()=>{
    const a=new Audio('https://upload.wikimedia.org/wikipedia/commons/4/4e/Beethoven_-_Moonlight_Sonata_%281st_Movement%29.ogg');
    a.loop=true;a.volume=volume;audioRef.current=a;
    return()=>{a.pause();a.src='';};
  },[]);

  useEffect(()=>{if(audioRef.current)audioRef.current.volume=volume;},[volume]);

  const toggle=()=>{
    if(!audioRef.current)return;
    if(playing){audioRef.current.pause();}else{audioRef.current.play().catch(()=>{});}
    setPlaying(!playing);
  };

  return (
    <div style={{position:'fixed',bottom:16,right:16,zIndex:100,display:'flex',alignItems:'center',gap:8,
      background:'rgba(255,255,255,0.95)',borderRadius:16,padding:'8px 14px',
      boxShadow:'0 4px 20px rgba(0,0,0,0.08)',border:'1px solid rgba(34,97,45,0.1)',
      backdropFilter:'blur(10px)'}}>
      <button onClick={toggle} style={{width:32,height:32,borderRadius:'50%',border:'none',cursor:'pointer',
        background:playing?'rgb(34,97,45)':'rgba(34,97,45,0.1)',color:playing?'#fff':'rgb(34,97,45)',
        fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.3s'}}>
        {playing?'♫':'♪'}
      </button>
      {playing && <input type="range" min="0" max="0.4" step="0.01" value={volume}
        onChange={e=>setVolume(parseFloat(e.target.value))}
        style={{width:70,accentColor:'rgb(34,97,45)',cursor:'pointer'}} />}
      <span style={{fontSize:9,color:'rgba(34,97,45,0.4)',letterSpacing:1}}>Beethoven</span>
    </div>
  );
}

/* ── PRODUCT GRID (center) ── */
function WaterBackground() {
  const drops = useMemo(() => Array.from({length:15},(_,i) => ({
    i, left:5+Math.random()*90, dur:3+Math.random()*4, delay:Math.random()*6,
    size:3+Math.random()*4, opacity:0.5+Math.random()*0.3
  })),[]);
  const bubbles = useMemo(() => Array.from({length:10},(_,i) => ({
    i, left:10+Math.random()*80, dur:4+Math.random()*5, delay:Math.random()*5,
    size:4+Math.random()*8
  })),[]);
  const ripples = useMemo(() => Array.from({length:5},(_,i) => ({
    i, left:15+Math.random()*70, top:20+Math.random()*60, dur:3+Math.random()*3, delay:i*1.5
  })),[]);
  const floatingLeaves = useMemo(() => Array.from({length:6},(_,i) => ({
    i, left:Math.random()*100, dur:6+Math.random()*5, delay:Math.random()*8,
    emoji:['🌿','🍃','☘️'][i%3], size:14+Math.random()*10
  })),[]);

  return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>
      {/* Falling water drops */}
      {drops.map(d => (
        <div key={'d'+d.i} style={{
          position:'absolute',left:d.left+'%',top:'-5%',
          width:d.size,height:d.size*3,borderRadius:'50% 50% 50% 50% / 30% 30% 70% 70%',
          background:`linear-gradient(180deg, rgba(134,239,172,${d.opacity}), rgba(34,197,94,${d.opacity*0.6}))`,
          boxShadow:`0 0 ${d.size*2}px rgba(134,239,172,0.15)`,
          animation:`dropFall ${d.dur}s linear ${d.delay}s infinite`
        }} />
      ))}
      {/* Rising bubbles */}
      {bubbles.map(b => (
        <div key={'b'+b.i} style={{
          position:'absolute',left:b.left+'%',bottom:'-5%',
          width:b.size,height:b.size,borderRadius:'50%',
          border:'1.5px solid rgba(134,239,172,0.35)',
          background:'radial-gradient(circle at 35% 35%, rgba(167,243,208,0.2), transparent)',
          animation:`bubbleRise ${b.dur}s ease-out ${b.delay}s infinite`
        }} />
      ))}
      {/* Ripple rings */}
      {ripples.map(r => (
        <div key={'r'+r.i} style={{
          position:'absolute',left:r.left+'%',top:r.top+'%',
          width:40,height:40,borderRadius:'50%',
          border:'2px solid rgba(134,239,172,0.18)',
          animation:`rippleExpand ${r.dur}s ease-out ${r.delay}s infinite`
        }} />
      ))}
      {/* Floating leaves */}
      {floatingLeaves.map(l => (
        <div key={'l'+l.i} style={{
          position:'absolute',left:l.left+'%',bottom:'0%',
          fontSize:l.size,opacity:0,
          animation:`floatLeaf ${l.dur}s ease-in-out ${l.delay}s infinite`
        }}>{l.emoji}</div>
      ))}
      {/* Bottom wave SVG */}
      <svg style={{position:'absolute',bottom:0,left:0,width:'200%',height:80,animation:'waveFlow 8s linear infinite'}}>
        <path d="M0,40 Q60,15 120,40 T240,40 T360,40 T480,40 T600,40 T720,40 T840,40 T960,40 T1080,40 T1200,40 T1320,40 T1440,40 T1560,40 T1680,40 T1800,40 T1920,40 L1920,80 L0,80 Z"
          fill="rgba(34,197,94,0.12)" />
        <path d="M0,50 Q50,30 100,50 T200,50 T300,50 T400,50 T500,50 T600,50 T700,50 T800,50 T900,50 T1000,50 T1100,50 T1200,50 T1300,50 T1400,50 T1500,50 T1600,50 T1700,50 T1800,50 T1920,50 L1920,80 L0,80 Z"
          fill="rgba(20,184,166,0.08)" />
      </svg>
    </div>
  );
}

              border:'1px solid rgba(34,97,45,0.06)',animation:`slideUp 0.3s ease-out ${i*0.04}s both`}}>
            <div style={{aspectRatio:'1',padding:12,display:'flex',alignItems:'center',justifyContent:'center',
              background:'rgba(34,97,45,0.02)'}}>
              <img src={p.data} alt={p.name} style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain'}} loading="lazy"/>
            </div>
            <div style={{padding:'10px 12px'}}>
              <div style={{fontSize:11,fontWeight:600,color:'rgb(34,97,45)',lineHeight:1.3,
                overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>
              <div style={{display:'flex',alignItems:'center',gap:4,marginTop:6}}>
                <div style={{width:18,height:18,borderRadius:'50%',background:'rgb(34,97,45)',
                  display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <span style={{color:'#fff',fontSize:11,lineHeight:1}}>+</span>
                </div>
                <span style={{fontSize:9,color:'rgba(34,97,45,0.5)',fontWeight:600}}>U ponudu</span>
              </div>
            </div>
          </div>
        ))}
      </div>
      </div>
    </div>
  );
}

/* ── OFFER PANEL (right) ── */
function OfferPanel({items,setItems,currency,setCurrency}) {
  const [customer,setCustomer]=useState({name:'',email:'',phone:'',address:''});
  const [notes,setNotes]=useState('');
  const [dragIdx,setDragIdx]=useState(null);

  const updateItem=(idx,f,v)=>setItems(p=>p.map((it,i)=>i===idx?{...it,[f]:v}:it));
  const removeItem=(idx)=>setItems(p=>p.filter((_,i)=>i!==idx));
  const moveItem=(from,to)=>{
    setItems(p=>{const n=[...p];const [m]=n.splice(from,1);n.splice(to,0,m);return n;});
  };

  const itemSub=(it)=>it.quantity*it.price*(1-(it.rebate||0)/100);
  const itemVat=(it)=>itemSub(it)*it.vatPercent/100;
  const itemTotal=(it)=>itemSub(it)+itemVat(it);
  const grandSub=items.reduce((s,i)=>s+itemSub(i),0);
  const grandVat=items.reduce((s,i)=>s+itemVat(i),0);
  const grandTotal=grandSub+grandVat;
  const fmt=(v)=>currency==='BAM'?fmtBAM(v):fmtEUR(v);
  const ucust=(f,v)=>setCustomer(p=>({...p,[f]:v}));

  const generatePDF=()=>{
    try {
    const {jsPDF} = window.jspdf;
    const doc = new jsPDF('p','mm','a4');
    const W = 210, H = 297, mg = 18;
    const today = new Date().toLocaleDateString('en-GB');
    const offerNum = 'AGM-' + Date.now().toString(36).toUpperCase().slice(-6);
    const green = [22, 101, 52];
    const darkGreen = [15, 63, 35];
    const lightGreen = [240, 253, 244];
    const gray = [100, 100, 100];
    const darkText = [30, 30, 30];

    // ── PAGE FOOTER FUNCTION ──
    const addFooter = (pageNum, totalPages) => {
      // Bottom green bar
      doc.setFillColor(...darkGreen);
      doc.rect(0, H - 16, W, 16, 'F');
      doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(180, 220, 190);
      doc.text('AGM Eco Solutions  |  ZAVNOBIH-a bb, Zenica 72000  |  +387 32 443-600  |  agm-ecosolutions.ba', W/2, H - 9, {align:'center'});
      doc.text('Stranica ' + pageNum + ' / ' + totalPages, W - mg, H - 9, {align:'right'});
    };

    // ── PAGE 1: COVER / HEADER ──
    let y = 0;

    // Top green header band
    doc.setFillColor(...darkGreen);
    doc.rect(0, 0, W, 48, 'F');

    // Accent stripe
    doc.setFillColor(...green);
    doc.rect(0, 48, W, 3, 'F');

    // Company name in header
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(24); doc.setFont('helvetica','bold');
    doc.text('AGM ECO SOLUTIONS', mg, 20);

    doc.setFontSize(9); doc.setFont('helvetica','normal');
    doc.setTextColor(180, 220, 190);
    doc.text('Wastewater Treatment Equipment & Systems', mg, 28);
    doc.text('ZAVNOBIH-a bb, Zenica 72000  |  +387 32 443-600', mg, 34);
    doc.text('www.agm-ecosolutions.ba', mg, 40);

    // Logo on right
    if (companyLogo) {
      try { doc.addImage(companyLogo, 'PNG', W - mg - 30, 6, 30, 30); } catch(e) {}
    } else if (typeof AGM_LOGO_DATA !== 'undefined' && AGM_LOGO_DATA) {
      try { doc.addImage(AGM_LOGO_DATA, 'PNG', W - mg - 30, 6, 30, 30); } catch(e) {}
    }

    y = 60;

    // OFFER title section
    doc.setFillColor(...lightGreen);
    doc.roundedRect(mg, y, W - mg*2, 22, 3, 3, 'F');
    doc.setFontSize(18); doc.setFont('helvetica','bold'); doc.setTextColor(...green);
    doc.text('PONUDA', mg + 8, y + 10);
    doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(...gray);
    doc.text('Broj: ' + offerNum, mg + 8, y + 17);
    doc.text('Datum: ' + today, W/2, y + 10, {align:'center'});
    doc.text('Valuta: ' + currency, W/2, y + 17, {align:'center'});
    doc.setFontSize(10); doc.setFont('helvetica','bold'); doc.setTextColor(...darkGreen);
    doc.text('OFFER', W - mg - 8, y + 10, {align:'right'});

    y += 30;

    // FROM / TO boxes side by side
    const boxW = (W - mg*2 - 8) / 2;

    // FROM box
    doc.setDrawColor(200, 220, 200); doc.setLineWidth(0.3);
    doc.roundedRect(mg, y, boxW, 32, 2, 2, 'S');
    doc.setFillColor(...lightGreen);
    doc.roundedRect(mg, y, boxW, 8, 2, 2, 'F');
    doc.rect(mg, y + 6, boxW, 2, 'F'); // cover bottom radius
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(...green);
    doc.text('OD / FROM', mg + 4, y + 5.5);
    doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(...darkText);
    let fy = y + 14;
    doc.setFont('helvetica','bold');
    doc.text('AGM Eco Solutions d.o.o.', mg + 4, fy); fy += 4.5;
    doc.setFont('helvetica','normal'); doc.setTextColor(...gray);
    doc.text('ZAVNOBIH-a bb, Zenica 72000', mg + 4, fy); fy += 4;
    doc.text('+387 32 443-600', mg + 4, fy); fy += 4;
    doc.text('agm-ecosolutions.ba', mg + 4, fy);

    // TO box
    const toX = mg + boxW + 8;
    doc.setDrawColor(200, 220, 200);
    doc.roundedRect(toX, y, boxW, 32, 2, 2, 'S');
    doc.setFillColor(...lightGreen);
    doc.roundedRect(toX, y, boxW, 8, 2, 2, 'F');
    doc.rect(toX, y + 6, boxW, 2, 'F');
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(...green);
    doc.text('ZA / TO', toX + 4, y + 5.5);
    doc.setFontSize(9); doc.setTextColor(...darkText);
    let cy = y + 14;
    if (customer.name) { doc.setFont('helvetica','bold'); doc.text(customer.name, toX + 4, cy); cy += 4.5; }
    doc.setFont('helvetica','normal'); doc.setTextColor(...gray);
    if (customer.address) { doc.text(customer.address, toX + 4, cy); cy += 4; }
    if (customer.phone) { doc.text(customer.phone, toX + 4, cy); cy += 4; }
    if (customer.email) { doc.text(customer.email, toX + 4, cy); }

    y += 40;

    // ── PRODUCT ITEMS ──
    items.forEach((item, idx) => {
      // Check if we need a new page (each item needs ~55mm)
      if (y > H - 75) {
        doc.addPage();
        y = 20;
      }

      // Item card with border
      const cardH = 50;
      doc.setDrawColor(210, 230, 210); doc.setLineWidth(0.3);
      doc.roundedRect(mg, y, W - mg*2, cardH, 2, 2, 'S');

      // Light green number badge
      doc.setFillColor(...green);
      doc.circle(mg + 8, y + 8, 5, 'F');
      doc.setFontSize(10); doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
      doc.text('' + (idx + 1), mg + 8, y + 9.5, {align:'center'});

      // Product image
      if (item.imgData) {
        try {
          const imgType = item.imgData.includes('image/png') ? 'PNG' : 'JPEG';
          doc.addImage(item.imgData, imgType, mg + 16, y + 3, 28, 28);
        } catch(e) {}
      }

      // Product name
      doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.setTextColor(...darkText);
      const displayName = item.name.length > 45 ? item.name.substring(0, 42) + '...' : item.name;
      doc.text(displayName, mg + 48, y + 9);

      // Category
      doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(...gray);
      doc.text(item.category || '', mg + 48, y + 14);

      // Description
      if (item.description) {
        doc.setFontSize(8); doc.setTextColor(80, 80, 80);
        const descLines = doc.splitTextToSize(item.description, W - mg*2 - 52);
        descLines.slice(0, 2).forEach((line, li) => {
          doc.text(line, mg + 48, y + 19 + li * 3.5);
        });
      }

      // Price details row at bottom of card
      const priceY = y + cardH - 10;
      doc.setDrawColor(230, 240, 230); doc.setLineWidth(0.2);
      doc.line(mg + 4, priceY - 4, W - mg - 4, priceY - 4);

      doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...gray);
      doc.text('Kol: ' + item.quantity, mg + 6, priceY);
      doc.text('Cijena: ' + fmt(item.price), mg + 30, priceY);
      if (item.rebate) doc.text('Rabat: ' + item.rebate + '%', mg + 70, priceY);
      doc.text('PDV: ' + item.vatPercent + '%', mg + 105, priceY);

      // Total for this item — bold green
      doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.setTextColor(...green);
      doc.text(fmt(itemTotal(item)), W - mg - 6, priceY, {align:'right'});

      y += cardH + 6;
    });

    // ── TOTALS SECTION ──
    if (y > H - 55) { doc.addPage(); y = 20; }

    y += 4;

    // Totals box
    const totalsX = W/2 + 10;
    const totalsW = W/2 - mg - 10;

    doc.setDrawColor(...green); doc.setLineWidth(0.5);
    doc.roundedRect(totalsX, y, totalsW, 38, 2, 2, 'S');

    // Subtotal
    doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(...gray);
    doc.text('Podzbroj / Subtotal:', totalsX + 5, y + 8);
    doc.setTextColor(...darkText);
    doc.text(fmt(grandSub), totalsX + totalsW - 5, y + 8, {align:'right'});

    // VAT
    doc.setTextColor(...gray);
    doc.text('PDV / VAT:', totalsX + 5, y + 16);
    doc.setTextColor(...darkText);
    doc.text(fmt(grandVat), totalsX + totalsW - 5, y + 16, {align:'right'});

    // Divider
    doc.setDrawColor(200, 220, 200); doc.setLineWidth(0.3);
    doc.line(totalsX + 4, y + 20, totalsX + totalsW - 4, y + 20);

    // Grand total with green background
    doc.setFillColor(...green);
    doc.roundedRect(totalsX + 2, y + 23, totalsW - 4, 12, 2, 2, 'F');
    doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(255, 255, 255);
    doc.text('UKUPNO:', totalsX + 8, y + 31);
    doc.text(fmt(grandTotal), totalsX + totalsW - 7, y + 31, {align:'right'});

    y += 48;

    // ── NOTES ──
    if (notes) {
      if (y > H - 40) { doc.addPage(); y = 20; }
      doc.setDrawColor(210, 230, 210); doc.setLineWidth(0.3);
      doc.roundedRect(mg, y, W - mg*2, 6 + Math.min(doc.splitTextToSize(notes, W - mg*2 - 12).length * 4, 30), 2, 2, 'S');
      doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(...green);
      doc.text('NAPOMENE / NOTES:', mg + 5, y + 5);
      doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(80, 80, 80);
      const noteLines = doc.splitTextToSize(notes, W - mg*2 - 12);
      noteLines.slice(0, 6).forEach((line, i) => {
        doc.text(line, mg + 5, y + 10 + i * 4);
      });
      y += 16 + Math.min(noteLines.length * 4, 24);
    }

    // ── SIGNATURE LINE ──
    if (y > H - 35) { doc.addPage(); y = 20; }
    y += 10;
    doc.setDrawColor(180, 180, 180); doc.setLineWidth(0.3);
    doc.line(mg, y + 12, mg + 60, y + 12);
    doc.line(W - mg - 60, y + 12, W - mg, y + 12);
    doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(150, 150, 150);
    doc.text('Potpis ponudioca / Seller signature', mg, y + 17);
    doc.text('Potpis kupca / Buyer signature', W - mg - 60, y + 17);

    // Add footers to all pages
    const totalPages = doc.internal.getNumberOfPages();
    for (let p = 1; p <= totalPages; p++) {
      doc.setPage(p);
      addFooter(p, totalPages);
    }

    doc.save('AGM_Ponuda_' + (customer.name || 'Kupac').replace(/\s+/g, '_') + '_' + today.replace(/\//g, '-') + '.pdf');
    } catch(err) { alert('PDF greska: ' + err.message); console.error(err); }
  };

  const onDragStart=(e,idx)=>{setDragIdx(idx);e.dataTransfer.effectAllowed='move';};
  const onDragOver=(e,idx)=>{e.preventDefault();e.dataTransfer.dropEffect='move';};
  const onDrop=(e,idx)=>{e.preventDefault();if(dragIdx!==null&&dragIdx!==idx)moveItem(dragIdx,idx);setDragIdx(null);};

  return (
    <div style={{width:380,minWidth:360,height:'100%',background:'linear-gradient(180deg, #f4f9f4 0%, #f0f6f0 50%, #edf4ed 100%)',borderLeft:'1px solid rgba(34,97,45,0.08)',
      display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {/* Header */}
      <div style={{padding:'16px 20px',borderBottom:'1px solid rgba(34,97,45,0.06)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div>
          <h3 className="playfair" style={{fontSize:18,fontWeight:700,color:'rgb(34,97,45)'}}>Ponuda</h3>
          <p style={{fontSize:10,color:'rgba(34,97,45,0.4)'}}>{items.length} proizvod{items.length!==1?'a':''}</p>
        </div>
        <button onClick={()=>setCurrency(c=>c==='BAM'?'EUR':'BAM')}
          style={{padding:'6px 14px',borderRadius:8,border:'1px solid rgba(34,97,45,0.15)',background:'rgba(34,97,45,0.04)',
            color:'rgb(34,97,45)',fontSize:12,fontWeight:700,cursor:'pointer'}}>{currency}</button>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'12px 16px'}}>
        {items.length===0 ? (
          <div style={{textAlign:'center',padding:'40px 0',color:'rgba(34,97,45,0.2)'}}>
            <div style={{fontSize:40,marginBottom:12}}>📋</div>
            <div style={{fontSize:13}}>Izaberite proizvod iz kataloga</div>
          </div>
        ) : (
          <>
            {/* Customer */}
            <div style={{marginBottom:12,padding:12,background:'rgba(34,97,45,0.02)',borderRadius:12,border:'1px solid rgba(34,97,45,0.06)'}}>
              <div style={{fontSize:10,fontWeight:700,color:'rgb(34,97,45)',letterSpacing:1,marginBottom:8}}>KUPAC</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                {[['name','Ime'],['email','Email'],['phone','Telefon'],['address','Adresa']].map(([f,l])=>(
                  <input key={f} value={customer[f]} onChange={e=>ucust(f,e.target.value)} placeholder={l}
                    style={{padding:'8px 10px',fontSize:12,border:'1px solid rgba(34,97,45,0.1)',borderRadius:8,outline:'none',
                      background:'#fff',fontFamily:'Inter'}} />
                ))}
              </div>
            </div>

            {/* Items — draggable */}
            <div style={{fontSize:10,fontWeight:700,color:'rgb(34,97,45)',letterSpacing:1,marginBottom:8}}>PROIZVODI — povuci za pomjeranje</div>
            {items.map((item,idx)=>(
              <div key={item.id} draggable onDragStart={e=>onDragStart(e,idx)} onDragOver={e=>onDragOver(e,idx)} onDrop={e=>onDrop(e,idx)}
                className="drop-zone" style={{padding:12,marginBottom:8,background:'#fff',borderRadius:12,
                  border:'1px solid rgba(34,97,45,0.08)',cursor:'grab',position:'relative',
                  animation:`slideUp 0.3s ease-out ${idx*0.05}s both`}}>
                <button onClick={()=>removeItem(idx)} style={{position:'absolute',top:6,right:6,width:22,height:22,borderRadius:'50%',border:'none',background:'rgba(220,38,38,0.06)',color:'#dc2626',fontSize:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
                <div style={{display:'flex',gap:10,marginBottom:8}}>
                  <div style={{width:56,height:56,borderRadius:10,background:'rgba(34,97,45,0.03)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,overflow:'hidden'}}>
                    <img src={item.imgData} alt="" style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain'}}/>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <input value={item.name} onChange={e=>updateItem(idx,'name',e.target.value)}
                      style={{width:'100%',fontSize:12,fontWeight:600,color:'rgb(34,97,45)',border:'none',borderBottom:'1px solid rgba(34,97,45,0.1)',padding:'2px 0',outline:'none',background:'transparent',fontFamily:'Inter'}}/>
                    <div style={{fontSize:9,color:'rgba(34,97,45,0.35)',marginTop:2}}>{item.category}</div>
                  </div>
                </div>
                {/* Description field */}
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:8,fontWeight:700,color:'rgba(34,97,45,0.4)',marginBottom:3}}>OPIS / DESCRIPTION</div>
                  <textarea value={item.description||''} onChange={e=>updateItem(idx,'description',e.target.value)}
                    placeholder="Unesite opis proizvoda..."
                    rows={2}
                    style={{width:'100%',padding:'8px 10px',fontSize:12,border:'1px solid rgba(34,97,45,0.1)',borderRadius:8,outline:'none',resize:'vertical',
                      background:'rgba(34,97,45,0.02)',fontFamily:'Inter',color:'rgb(34,97,45)',lineHeight:1.4}} />
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:4}}>
                  {[['quantity','Kol.',item.quantity,'number'],['price','Cijena',item.price||'','number'],['vatPercent','PDV%',item.vatPercent,'number'],['rebate','Rabat%',item.rebate||'','number']].map(([f,l,v,t])=>(
                    <div key={f}>
                      <div style={{fontSize:8,fontWeight:700,color:'rgba(34,97,45,0.4)',marginBottom:2}}>{l}</div>
                      <input type={t} value={v} onChange={e=>updateItem(idx,f,f==='quantity'?parseInt(e.target.value)||1:parseFloat(e.target.value)||0)}
                        style={{width:'100%',padding:'6px 4px',fontSize:12,fontWeight:600,textAlign:'center',border:'1px solid rgba(34,97,45,0.08)',borderRadius:6,outline:'none',background:'rgba(34,97,45,0.02)',fontFamily:'Inter'}}/>
                    </div>
                  ))}
                </div>
                <div style={{display:'flex',justifyContent:'flex-end',marginTop:6,fontSize:13,fontWeight:700,color:'rgb(34,97,45)'}}>{fmt(itemTotal(item))}</div>
              </div>
            ))}

            {/* Notes */}
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Napomene..." rows={2}
              style={{width:'100%',padding:10,fontSize:12,border:'1px solid rgba(34,97,45,0.08)',borderRadius:10,outline:'none',resize:'none',marginTop:4,marginBottom:8,fontFamily:'Inter',background:'rgba(34,97,45,0.02)'}}/>

            {/* Totals */}
            <div style={{background:'linear-gradient(135deg,rgb(28,80,38),rgb(22,65,34))',borderRadius:14,padding:14,color:'#fff'}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}><span style={{opacity:0.6}}>Podzbroj</span><span>{fmt(grandSub)}</span></div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:6}}><span style={{opacity:0.6}}>PDV</span><span>{fmt(grandVat)}</span></div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:18,fontWeight:800,paddingTop:8,borderTop:'1px solid rgba(255,255,255,0.15)'}}><span>UKUPNO</span><span style={{color:'#86efac'}}>{fmt(grandTotal)}</span></div>
              <button onClick={generatePDF} style={{width:'100%',marginTop:12,padding:12,borderRadius:10,border:'none',background:'rgba(134,239,172,0.2)',color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:'Inter',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                <span>📄</span> Download PDF
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [splash,setSplash]=useState(true);
  const [activeCat,setActiveCat]=useState(null);
  const [offerItems,setOfferItems]=useState([]);
  const [currency,setCurrency]=useState('BAM');
  const idRef=useRef(0);

  // Floating green particles for header — must be before early return
  const headerParticles = useMemo(() => Array.from({length:20},(_,i) => ({
    i, left:Math.random()*100, dur:4+Math.random()*4, delay:Math.random()*5,
    size:3+Math.random()*5
  })),[]);

  const addToOffer=useCallback((prod,catName)=>{
    setOfferItems(p=>[...p,{id:++idRef.current,name:prod.name,imgData:prod.data,category:catName,description:'',quantity:1,price:0,vatPercent:17,rebate:0}]);
  },[]);

  if(splash) return <Splash onDone={()=>setSplash(false)}/>;

  return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>

      {/* TOP HEADER BAR with typewriter name */}
      <div style={{
        background:'linear-gradient(90deg, #0a2e1a, #0d3b2a 30%, #0e4a3a 60%, #0b4040 80%, #0a2e1a)',
        padding:'14px 28px',display:'flex',alignItems:'center',justifyContent:'space-between',
        position:'relative',overflow:'hidden',flexShrink:0,
        boxShadow:'0 4px 20px rgba(0,0,0,0.2)',zIndex:10
      }}>
        {/* Floating green particles in header */}
        {headerParticles.map(p => (
          <div key={'hp'+p.i} style={{
            position:'absolute',left:p.left+'%',bottom:0,
            width:p.size,height:p.size,borderRadius:'50%',
            background:`radial-gradient(circle, rgba(134,239,172,${0.4+Math.random()*0.3}), transparent 70%)`,
            boxShadow:`0 0 ${p.size*3}px rgba(134,239,172,0.2)`,
            animation:`glowParticle ${p.dur}s ease-out ${p.delay}s infinite`,
            pointerEvents:'none'
          }} />
        ))}

        {/* Left: Logo + company */}
        <div style={{display:'flex',alignItems:'center',gap:12,zIndex:1}}>
          {typeof AGM_LOGO_DATA!=='undefined'&&AGM_LOGO_DATA&&<img src={AGM_LOGO_DATA} style={{width:40,height:40,borderRadius:12,objectFit:'contain',background:'rgba(255,255,255,0.08)',padding:3}}/>}
          <div>
            <div style={{color:'#fff',fontWeight:700,fontSize:15,letterSpacing:0.5}}>AGM Eco Solutions</div>
            <div style={{color:'rgba(167,243,208,0.4)',fontSize:9,letterSpacing:3}}>OFFER GENERATOR</div>
          </div>
        </div>

        {/* Center: Typewriter animated cursive name */}
        <div style={{position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)',zIndex:1}}>
          <div style={{
            fontFamily:"'Dancing Script',cursive",fontSize:'clamp(24px,3vw,36px)',fontWeight:700,
            color:'#a7f3d0',whiteSpace:'nowrap',overflow:'hidden',
            borderRight:'2px solid rgba(167,243,208,0.8)',
            animation:'typewriter 2.5s steps(16,end) 0.5s forwards, blinkCaret 0.8s step-end infinite',
            width:0,
            textShadow:'0 0 20px rgba(134,239,172,0.3), 0 2px 10px rgba(0,0,0,0.2)'
          }}>
            Mr. Mensud Agić
          </div>
        </div>

        {/* Right: contact */}
        <div style={{textAlign:'right',zIndex:1}}>
          <div style={{color:'rgba(167,243,208,0.4)',fontSize:10}}>+387 32 443-600</div>
          <div style={{color:'rgba(167,243,208,0.3)',fontSize:9}}>agm-ecosolutions.ba</div>
        </div>
      </div>

      {/* Ambient background — stronger greens */}
      <div style={{position:'fixed',inset:0,zIndex:0,pointerEvents:'none',overflow:'hidden'}}>
        <div style={{position:'absolute',top:'-15%',right:'-5%',width:'55%',height:'55%',borderRadius:'50%',background:'radial-gradient(circle,rgba(34,197,94,0.06),transparent 70%)',animation:'gentlePulse 8s ease-in-out infinite'}}/>
        <div style={{position:'absolute',bottom:'-10%',left:'-5%',width:'45%',height:'45%',borderRadius:'50%',background:'radial-gradient(circle,rgba(20,184,166,0.05),transparent 70%)',animation:'gentlePulse 10s ease-in-out 2s infinite'}}/>
        <div style={{position:'absolute',top:'30%',left:'40%',width:'35%',height:'35%',borderRadius:'50%',background:'radial-gradient(circle,rgba(74,222,128,0.04),transparent 70%)',animation:'gentlePulse 12s ease-in-out 4s infinite'}}/>
      </div>

      {/* Main layout */}
      <div style={{flex:1,display:'flex',position:'relative',zIndex:1,overflow:'hidden'}}>
        <LeftMenu activeCat={activeCat} onSelect={setActiveCat}/>
        <ProductGrid category={activeCat!==null?CATS[activeCat]:null} onAddToOffer={addToOffer}/>
        <OfferPanel items={offerItems} setItems={setOfferItems} currency={currency} setCurrency={setCurrency}/>
      </div>

      <MusicPlayer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
