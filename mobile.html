// Resolve image: use embedded base64 data, fallback to file path
function resolveImage(folder, filename) {
  const key = folder.replace('images/', '') + '/' + filename;
  if (typeof IMAGE_DATA !== 'undefined' && IMAGE_DATA[key]) return IMAGE_DATA[key];
  return folder + '/' + filename;
}
function resolveLogo(filename) {
  const key = 'logos/' + filename;
  if (typeof IMAGE_DATA !== 'undefined' && IMAGE_DATA[key]) return IMAGE_DATA[key];
  return 'images/logos/' + filename;
}

const AGM_LOGO = resolveLogo('000-AGMNOVIKOMBIN.logo-oie.png');

// Build flat product list with category info

  cat.files.forEach(f => {
    ALL_PRODUCTS.push({
      filename: f,
      name: cleanName(f),
      path: resolveImage(cat.folder, f),
      category: cat.name,
      categoryId: cat.id
    });
  });
});

function cleanName(f) {
  let n = f.replace(/\.[^/.]+$/, '');
  n = n.replace(/-[A-Za-z0-9_-]{16,}$/, '');
  n = n.replace(/_clipped_rev_1/gi, '');
  n = n.replace(/-Copy\d*/gi, '');
  n = n.replace(/oie_/gi, '');
  n = n.replace(/_/g, ' ').replace(/\./g, ' ').replace(/-+/g, ' ').replace(/\s+/g, ' ').trim();
  return n || f;
}

function fmtBAM(v) { return (v||0).toFixed(2) + ' KM'; }
function fmtEUR(v) { return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(v||0); }

function OfferPanel({ items, setItems, onClose, onAddMore }) {
  const [company, setCompany] = useState(() => {
    try { return JSON.parse(localStorage.getItem('agm_company')) || {}; } catch(e) { return {}; }
  });
  const [customer, setCustomer] = useState({ name:'', email:'', address:'', phone:'' });
  const [notes, setNotes] = useState('');
  const [companyLogo, setCompanyLogo] = useState(null);
  const [currency, setCurrency] = useState('BAM'); // BAM or EUR
  const [showCompany, setShowCompany] = useState(false);
  const [showCustomer, setShowCustomer] = useState(false);

  // Save company to localStorage
  useEffect(() => {
    if (company.name) localStorage.setItem('agm_company', JSON.stringify(company));
  }, [company]);

  const updateItem = (idx, field, val) => {
    setItems(prev => prev.map((it,i) => i===idx ? {...it, [field]:val} : it));
  };
  const removeItem = (idx) => setItems(prev => prev.filter((_,i) => i!==idx));

  const itemTotal = (it) => {
    const sub = it.quantity * it.price;
    const afterRebate = sub * (1 - (it.rebate||0)/100);
    return afterRebate * (1 + it.vatPercent/100);
  };
  const itemSubtotal = (it) => it.quantity * it.price * (1 - (it.rebate||0)/100);
  const itemVat = (it) => itemSubtotal(it) * it.vatPercent / 100;

  const grandSub = items.reduce((s,i) => s + itemSubtotal(i), 0);
  const grandVat = items.reduce((s,i) => s + itemVat(i), 0);
  const grandTotal = grandSub + grandVat;

  const fmt = (v) => currency === 'BAM' ? fmtBAM(v) : fmtEUR(v);

  const onLogoUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = () => setCompanyLogo(r.result);
    r.readAsDataURL(file);
  };

  const uc = (f,v) => setCompany(p => ({...p,[f]:v}));
  const ucust = (f,v) => setCustomer(p => ({...p,[f]:v}));

  /* PDF */
  const generatePDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p','mm','a4');
    const W=210, mg=15;
    let y = mg;

    doc.setFillColor(20,83,45); doc.rect(0,0,W,34,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(20); doc.setFont('helvetica','bold');
    doc.text('PONUDA / OFFER', mg, 16);
    doc.setFontSize(9); doc.setFont('helvetica','normal');
    doc.text('AGM Eco Solutions — Wastewater Treatment Equipment', mg, 23);
    const today = new Date().toLocaleDateString('en-GB');
    const ref = 'AGM-' + Date.now().toString(36).toUpperCase();
    doc.text(`Datum: ${today}  |  Ref: ${ref}`, W-mg, 16, {align:'right'});
    doc.text(`Valuta: ${currency}`, W-mg, 23, {align:'right'});

    if (companyLogo) { try { doc.addImage(companyLogo,'PNG',W-mg-24,3,24,24); } catch(e){} }
    y = 44;

    doc.setTextColor(20,83,45); doc.setFontSize(10); doc.setFont('helvetica','bold');
    doc.text('OD / FROM:', mg, y); doc.text('ZA / TO:', W/2+5, y); y+=5;
    doc.setTextColor(60,60,60); doc.setFontSize(9); doc.setFont('helvetica','normal');
    const cl = [company.name,company.email,company.phone,company.website,company.vat?`PDV/VAT: ${company.vat}`:''].filter(Boolean);
    const cul = [customer.name,customer.email,customer.phone,customer.address].filter(Boolean);
    for(let i=0;i<Math.max(cl.length,cul.length);i++){
      if(cl[i]) doc.text(cl[i],mg,y);
      if(cul[i]) doc.text(cul[i],W/2+5,y);
      y+=5;
    }
    y+=6;
    doc.setDrawColor(20,83,45); doc.setLineWidth(0.5); doc.line(mg,y,W-mg,y); y+=6;

    // Table header
    doc.setFillColor(240,253,244); doc.rect(mg,y-4,W-mg*2,8,'F');
    doc.setTextColor(20,83,45); doc.setFontSize(7.5); doc.setFont('helvetica','bold');
    doc.text('#',mg+2,y); doc.text('Proizvod',mg+8,y);
    doc.text('Kol.',105,y); doc.text('Cijena',115,y); doc.text('Rabat',137,y); doc.text('PDV',152,y);
    doc.text('Ukupno',W-mg,y,{align:'right'}); y+=8;

    doc.setFont('helvetica','normal'); doc.setTextColor(50,50,50);
    items.forEach((item,idx) => {
      if(y>260){doc.addPage();y=mg;}
      if(idx%2===0){doc.setFillColor(250,250,245);doc.rect(mg,y-4,W-mg*2,7,'F');}
      doc.setFontSize(7.5);
      doc.text(`${idx+1}`,mg+2,y);
      const dn = item.name.length>35 ? item.name.substring(0,32)+'...' : item.name;
      doc.text(dn,mg+8,y);
      doc.text(`${item.quantity}`,105,y);
      doc.text(fmt(item.price),115,y);
      doc.text(`${item.rebate||0}%`,137,y);
      doc.text(`${item.vatPercent}%`,152,y);
      doc.text(fmt(itemTotal(item)),W-mg,y,{align:'right'});
      y+=7;
      if(item.description){
        doc.setFontSize(6.5); doc.setTextColor(120,120,120);
        doc.splitTextToSize(item.description,90).slice(0,2).forEach(l=>{doc.text(l,mg+8,y);y+=3.5;});
        doc.setTextColor(50,50,50);
      }
    });

    y+=4; doc.line(mg,y,W-mg,y); y+=7;
    doc.setFontSize(10); doc.setFont('helvetica','normal');
    doc.text('Podzbroj / Subtotal:',120,y); doc.text(fmt(grandSub),W-mg,y,{align:'right'}); y+=6;
    doc.text('PDV / VAT:',120,y); doc.text(fmt(grandVat),W-mg,y,{align:'right'}); y+=6;
    doc.setFillColor(20,83,45); doc.rect(115,y-5,W-mg-115,12,'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(12);
    doc.text('UKUPNO:',120,y+2); doc.text(fmt(grandTotal),W-mg-2,y+2,{align:'right'});
    y+=18;

    if(notes){
      if(y>260){doc.addPage();y=mg;}
      doc.setTextColor(20,83,45); doc.setFontSize(10); doc.setFont('helvetica','bold');
      doc.text('Napomene / Notes:',mg,y); y+=6;
      doc.setTextColor(80,80,80); doc.setFontSize(8); doc.setFont('helvetica','normal');
      doc.splitTextToSize(notes,W-mg*2).forEach(l=>{if(y>285){doc.addPage();y=mg;}doc.text(l,mg,y);y+=4;});
    }
    doc.setTextColor(150,150,150); doc.setFontSize(7);
    doc.text('Generated by AGM Eco Solutions Offer Generator',W/2,290,{align:'center'});
    doc.save(`Ponuda_${customer.name||'Kupac'}_${today.replace(/\//g,'-')}.pdf`);
  };

  return (
    <div className="fixed inset-0 z-50 bg-sage-50 overflow-y-auto slide-right">
      {/* Offer Header */}
      <div className="bg-gradient-to-r from-forest-900 to-forest-950 px-4 py-3 flex items-center gap-3 sticky top-0 z-10">
        <button onClick={onClose} className="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center">
          <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <div className="flex-1">
          <h2 className="text-white font-bold">Offer Template</h2>
          <p className="text-forest-400 text-[10px]">{items.length} product{items.length!==1?'s':''}</p>
        </div>
        {/* Currency toggle */}
        <button onClick={() => setCurrency(c => c==='BAM'?'EUR':'BAM')}
          className="px-3 py-1.5 bg-white/10 rounded-lg text-forest-300 text-xs font-bold active:bg-white/20">
          {currency}
        </button>
      </div>

      <div className="px-4 py-4 space-y-4">
        {/* Company Accordion */}
        <div className="bg-white rounded-2xl border border-sage-100 overflow-hidden shadow-sm">
          <button onClick={() => setShowCompany(!showCompany)} className="w-full flex items-center justify-between px-4 py-3.5">
            <span className="font-bold text-forest-800 text-sm flex items-center gap-2"><span>🏢</span> Company Info</span>
            <svg className={`w-4 h-4 text-sage-400 transition-transform ${showCompany?'rotate-180':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
          </button>
          {showCompany && (
            <div className="px-4 pb-4 space-y-3 slide-up border-t border-sage-100 pt-3">
              <Field label="Company Name" value={company.name||''} onChange={v=>uc('name',v)} placeholder="AGM Eco Solutions" />
              <div>
                <label className="block text-[10px] font-semibold text-sage-500 uppercase tracking-wider mb-1">Logo</label>
                <label className="flex items-center gap-2 px-3.5 py-3 bg-sage-50 border border-sage-200 rounded-xl cursor-pointer text-sm text-sage-500">
                  📎 {companyLogo ? 'Logo uploaded ✓' : 'Upload logo...'}
                  <input type="file" accept="image/*" onChange={onLogoUpload} className="hidden" />
                </label>
              </div>
              <Field label="Email" value={company.email||''} onChange={v=>uc('email',v)} type="email" placeholder="info@agm.ba" />
              <Field label="Phone" value={company.phone||''} onChange={v=>uc('phone',v)} type="tel" placeholder="+387 00 000 000" />
              <Field label="Website" value={company.website||''} onChange={v=>uc('website',v)} placeholder="www.agm.ba" />
              <Field label="PDV/VAT Number" value={company.vat||''} onChange={v=>uc('vat',v)} placeholder="PDV/ID broj" />
            </div>
          )}
        </div>

        {/* Customer Accordion */}
        <div className="bg-white rounded-2xl border border-sage-100 overflow-hidden shadow-sm">
          <button onClick={() => setShowCustomer(!showCustomer)} className="w-full flex items-center justify-between px-4 py-3.5">
            <span className="font-bold text-forest-800 text-sm flex items-center gap-2"><span>👤</span> Customer Info</span>
            <svg className={`w-4 h-4 text-sage-400 transition-transform ${showCustomer?'rotate-180':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
          </button>
          {showCustomer && (
            <div className="px-4 pb-4 space-y-3 slide-up border-t border-sage-100 pt-3">
              <Field label="Customer Name" value={customer.name} onChange={v=>ucust('name',v)} placeholder="Ime kupca" />
              <Field label="Email" value={customer.email} onChange={v=>ucust('email',v)} type="email" placeholder="kupac@email.com" />
              <Field label="Phone" value={customer.phone} onChange={v=>ucust('phone',v)} type="tel" />
              <Field label="Address" value={customer.address} onChange={v=>ucust('address',v)} placeholder="Adresa" />
            </div>
          )}
        </div>

        {/* Product Items */}
        <div>
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-bold text-forest-800 text-sm">Products ({items.length})</h3>
            <button onClick={onAddMore}
              className="flex items-center gap-1 bg-forest-700 text-white px-4 py-2 rounded-full text-xs font-semibold active:scale-95 transition-transform shadow-md">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M12 4v16m8-8H4"/>
              </svg>
              Add Product
            </button>
          </div>

          <div className="space-y-3">
            {items.map((item,idx) => (
              <div key={item.id} className="bg-white rounded-2xl border border-sage-100 p-4 slide-up relative">
                <button onClick={() => removeItem(idx)}
                  className="absolute top-2 right-2 w-7 h-7 bg-red-50 text-red-400 rounded-full flex items-center justify-center z-10">
                  <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </button>

                <div className="flex gap-3 mb-3">
                  <div className="w-20 h-20 bg-sage-50 rounded-xl overflow-hidden flex items-center justify-center flex-shrink-0">
                    <img src={item.path} alt={item.name} className="max-w-full max-h-full object-contain" />
                  </div>
                  <div className="flex-1 min-w-0 pr-6">
                    <input value={item.name} onChange={e => updateItem(idx,'name',e.target.value)}
                      className="w-full font-bold text-forest-900 text-sm bg-transparent border-b border-sage-200 pb-1 focus:outline-none focus:border-forest-500" />
                    <p className="text-[9px] text-sage-400 mt-1">{item.category}</p>
                    <textarea value={item.description} onChange={e => updateItem(idx,'description',e.target.value)}
                      placeholder="Opis / Description..." rows={2}
                      className="w-full mt-2 text-xs text-sage-600 bg-sage-50 border border-sage-200 rounded-lg p-2 focus:outline-none focus:border-forest-400 resize-none" />
                  </div>
                </div>

                <div className="grid grid-cols-4 gap-2 mb-3">
                  <div>
                    <label className="block text-[9px] font-semibold text-sage-500 uppercase mb-1">Qty</label>
                    <input type="number" min="1" value={item.quantity} onChange={e => updateItem(idx,'quantity',parseInt(e.target.value)||1)}
                      className="w-full px-2 py-2.5 bg-sage-50 border border-sage-200 rounded-xl text-forest-900 text-sm focus:outline-none focus:border-forest-500" />
                  </div>
                  <div>
                    <label className="block text-[9px] font-semibold text-sage-500 uppercase mb-1">Price</label>
                    <input type="number" min="0" step="0.01" value={item.price||''} onChange={e => updateItem(idx,'price',parseFloat(e.target.value)||0)}
                      placeholder="0.00"
                      className="w-full px-2 py-2.5 bg-sage-50 border border-sage-200 rounded-xl text-forest-900 text-sm focus:outline-none focus:border-forest-500" />
                  </div>
                  <div>
                    <label className="block text-[9px] font-semibold text-sage-500 uppercase mb-1">VAT %</label>
                    <input type="number" min="0" max="100" value={item.vatPercent} onChange={e => updateItem(idx,'vatPercent',parseFloat(e.target.value)||0)}
                      className="w-full px-2 py-2.5 bg-sage-50 border border-sage-200 rounded-xl text-forest-900 text-sm focus:outline-none focus:border-forest-500" />
                  </div>
                  <div>
                    <label className="block text-[9px] font-semibold text-sage-500 uppercase mb-1">Rabat %</label>
                    <input type="number" min="0" max="100" value={item.rebate||''} onChange={e => updateItem(idx,'rebate',parseFloat(e.target.value)||0)}
                      placeholder="0"
                      className="w-full px-2 py-2.5 bg-sage-50 border border-sage-200 rounded-xl text-forest-900 text-sm focus:outline-none focus:border-forest-500" />
                  </div>
                </div>

                <div className="flex items-center justify-between px-1 pt-2 border-t border-sage-100">
                  <span className="text-[10px] text-sage-500">Sub: <strong className="text-forest-800">{fmt(itemSubtotal(item))}</strong></span>
                  <span className="text-[10px] text-sage-500">PDV: <strong className="text-forest-800">{fmt(itemVat(item))}</strong></span>
                  <span className="text-sm font-bold text-forest-700">{fmt(itemTotal(item))}</span>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Notes */}
        <div className="bg-white rounded-2xl border border-sage-100 p-4 shadow-sm">
          <label className="block text-[10px] font-semibold text-sage-500 uppercase tracking-wider mb-2">Napomene / Notes</label>
          <textarea value={notes} onChange={e => setNotes(e.target.value)} rows={3}
            placeholder="Uslovi placanja, rok isporuke..."
            className="w-full px-3.5 py-3 bg-sage-50 border border-sage-200 rounded-xl text-forest-900 placeholder-sage-400 focus:outline-none focus:border-forest-500 resize-none text-sm" />
        </div>

        {/* Totals & Export */}
        <div className="bg-gradient-to-br from-forest-800 to-forest-950 rounded-2xl p-5 text-white shadow-xl">
          <div className="flex items-center justify-between mb-2">
            <p className="text-forest-400 text-[10px] uppercase tracking-widest">Summary</p>
            <span className="text-forest-400 text-xs font-bold">{currency}</span>
          </div>
          <div className="space-y-1 mb-3">
            <div className="flex justify-between text-sm"><span className="text-forest-300">Podzbroj</span><span className="font-semibold">{fmt(grandSub)}</span></div>
            <div className="flex justify-between text-sm"><span className="text-forest-300">PDV</span><span className="font-semibold">{fmt(grandVat)}</span></div>
            <div className="flex justify-between text-lg font-bold pt-2 border-t border-forest-700">
              <span className="text-forest-100">Ukupno</span>
              <span className="text-forest-300">{fmt(grandTotal)}</span>
            </div>
          </div>
          <div className="flex gap-2 mt-4">
            <button onClick={generatePDF}
              className="flex-1 bg-forest-500 hover:bg-forest-400 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 text-sm active:scale-95 transition-transform shadow-lg">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
              Download PDF
            </button>
            <button onClick={() => { setItems([]); setNotes(''); }}
              className="bg-white/10 text-white font-medium px-5 py-4 rounded-2xl text-sm active:scale-95">Clear</button>
          </div>
        </div>
        <div className="h-8" />
      </div>
    </div>
  );
}

function Field({ label, value, onChange, type='text', placeholder='' }) {
  return (
    <div>
      <label className="block text-[10px] font-semibold text-sage-500 uppercase tracking-wider mb-1">{label}</label>
      <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
        className="w-full px-3.5 py-3 bg-sage-50 border border-sage-200 rounded-xl text-forest-900 placeholder-sage-400 focus:outline-none focus:border-forest-500 focus:bg-white transition-all" />
    </div>
  );
}

/* ── MAIN APP ── */
function App() {
  const [splash, setSplash] = useState(true);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [search, setSearch] = useState('');
  const [activeCategory, setActiveCategory] = useState(null);
  const [offerItems, setOfferItems] = useState([]);
  const [showOffer, setShowOffer] = useState(false);
  let idRef = useRef(0);

  const filtered = useMemo(() => {
    let list = activeCategory
      ? ALL_PRODUCTS.filter(p => p.categoryId === activeCategory)
      : ALL_PRODUCTS;
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(p => p.name.toLowerCase().includes(q) || p.filename.toLowerCase().includes(q) || p.category.toLowerCase().includes(q));
    }
    return list;
  }, [search, activeCategory]);

  const activeCatName = activeCategory ? CATEGORIES.find(c=>c.id===activeCategory)?.name : null;

  const addProduct = useCallback((p) => {
    setOfferItems(prev => [...prev, {
      id: ++idRef.current,
      filename: p.filename,
      name: p.name,
      path: p.path,
      category: p.category,
      description: '',
      quantity: 1,
      price: 0,
      vatPercent: 17,
      rebate: 0
    }]);
    setShowOffer(true);
  }, []);

  return (
    <div className="min-h-screen flex flex-col">
      {splash && <SplashScreen onDone={() => setSplash(false)} />}

      <Drawer open={drawerOpen} onClose={() => setDrawerOpen(false)}
        categories={CATEGORIES} onSelectCategory={setActiveCategory} activeCategory={activeCategory} />

      <Header onMenuToggle={() => setDrawerOpen(true)} />
      <SearchBar value={search} onChange={setSearch} />

      {/* Category chips */}
      <div className="flex gap-2 px-4 py-3 overflow-x-auto" style={{WebkitOverflowScrolling:'touch'}}>
        <button onClick={() => setActiveCategory(null)}
          className={`flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold transition-all ${!activeCategory ? 'bg-forest-700 text-white shadow-md' : 'bg-white text-sage-600 border border-sage-200'}`}>
          All
        </button>
        {CATEGORIES.map(cat => (
          <button key={cat.id} onClick={() => setActiveCategory(activeCategory===cat.id ? null : cat.id)}
            className={`flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold transition-all whitespace-nowrap ${activeCategory===cat.id ? 'bg-forest-700 text-white shadow-md' : 'bg-white text-sage-600 border border-sage-200'}`}>
            {cat.icon} {cat.name}
          </button>
        ))}
      </div>

      <ProductGrid products={filtered} onAdd={addProduct} categoryName={activeCatName} />

      {/* Floating offer button */}
      {offerItems.length > 0 && !showOffer && (
        <button onClick={() => setShowOffer(true)}
          className="fixed bottom-6 right-4 bg-forest-700 text-white px-5 py-4 rounded-2xl shadow-2xl flex items-center gap-2 active:scale-95 transition-transform z-40 pop-in"
          style={{boxShadow:'0 8px 30px rgba(20,83,45,0.4)'}}>
          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          <span className="font-bold text-sm">Offer</span>
          <span className="bg-white text-forest-800 text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center">{offerItems.length}</span>
        </button>
      )}

      {/* Offer Panel */}
      {showOffer && (
        <OfferPanel
          items={offerItems}
          setItems={setOfferItems}
          onClose={() => setShowOffer(false)}
          onAddMore={() => setShowOffer(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
