<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <meta name="theme-color" content="#052e16" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AGM Offers" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: {50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d',950:'#052e16'},
            sage: {50:'#f6f7f4',100:'#e8ebe3',200:'#d2d8c8',300:'#b3bda3',400:'#94a17e',500:'#788964'}

        }
      }

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    input[type="number"]{-moz-appearance:textfield}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideLeft{from{transform:translateX(100%);opacity:0.5}to{transform:translateX(0);opacity:1}}
    @keyframes slideOut{from{transform:translateX(0)}to{transform:translateX(100%)}}
    @keyframes popIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
    @keyframes chevron{0%,100%{transform:rotate(0deg)}50%{transform:rotate(180deg)}}
    .slide-up{animation:slideUp 0.35s ease-out}
    .slide-left{animation:slideLeft 0.4s cubic-bezier(0.25,0.46,0.45,0.94)}
    .fade-in{animation:fadeIn 0.3s ease-out}
    .pop-in{animation:popIn 0.3s ease-out}
    ::-webkit-scrollbar{width:0;background:transparent}

    /* SPLASH ANIMATIONS */
    @keyframes splashTextIn{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes splashLogoScale{0%{opacity:0;transform:scale(0.5)}50%{opacity:1;transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
    @keyframes riverFlow{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    @keyframes splashDrop{0%{r:6;opacity:0.8}100%{r:35;opacity:0}}
    @keyframes splashFadeOut{0%{opacity:1}100%{opacity:0}}
    @keyframes sparkleGreen{0%{opacity:0;transform:scale(0) rotate(0)}40%{opacity:1;transform:scale(1) rotate(90deg)}100%{opacity:0;transform:scale(0.3) rotate(180deg)}}
    @keyframes leafDrift{0%{opacity:0;transform:translateY(40px) rotate(-20deg)}40%{opacity:0.9}80%{opacity:0.9}100%{opacity:0;transform:translateY(-50px) rotate(25deg)}}
    @keyframes leafBloom{0%{opacity:0;transform:scale(0) rotate(-30deg)}60%{opacity:1;transform:scale(1.15) rotate(5deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
  </style>
</head>
<body>
<div id="root"></div>
<script src="splash_logo.js"></script>
<script src="imagedata.js"></script>
<script type="text/babel">
const { useState, useRef, useCallback, useMemo, useEffect } = React;

/* ── BUILD CATEGORIES FROM EMBEDDED DATA ── */
const CATEGORY_ICONS = {
  'BIO UREDJAJI FEKALNIH VODA': '🔬',
  'Crpna Stanica': '💧',
  'FIKSNA RESETKA': '🔩',
  'Mastolovi': '🛢️',
  'SEPTICKE BIOLOSKE Jame': '🏗️',
  'Separatori ulja': '⚙️',
  'Tank, Spremnik': '🔵'
};

const SHORT_NAMES = {
  'BIO UREDJAJI FEKALNIH VODA': 'Bio Uredjaji',
  'Crpna Stanica - ISEA ureÄaji i sistemi za tretman otpadnih voda': 'Crpne Stanice',
  'FIKSNA RESETKA': 'Fiksna Resetka',
  'Mastolovi - pjeskolovi - hvataÄi organskih ulja i masnoÄa - ISEA ureÄaji i sistemi za tretman otpadnih voda': 'Mastolovi / Pjeskolovi',
  'SEPTICKE BIOLOSKE Jame': 'Septicke Jame',
  'Separatori ulja, masti, naftnih derivata i ostalih lakih tekuÄina - ISEA ureÄaji i sistemi za tretman otpadnih voda': 'Separatori Ulja',
  'Tank, Spremnik, Rezervoar, za vodu i razne hemijske tekuÄine - ISEA ureÄaji i sistemi za tretman otpadnih voda': 'Spremnici / Tankovi'
};

function getIcon(fullName) {
  for (const [key, icon] of Object.entries(CATEGORY_ICONS)) {
    if (fullName.includes(key)) return icon;
  }
  return '📦';
}

function getShortName(fullName) {
  return SHORT_NAMES[fullName] || fullName;
}

function cleanProductName(f) {
  let n = f.replace(/\.[^/.]+$/, '');
  n = n.replace(/-[A-Za-z0-9_-]{16,}$/, '');
  n = n.replace(/_clipped_rev_1/gi, '');
  n = n.replace(/-Copy\d*/gi, '');
  n = n.replace(/oie_/gi, '');
  n = n.replace(/_/g, ' ').replace(/\./g, ' ').replace(/-+/g, ' ').replace(/\s+/g, ' ').trim();
  return n || f;
}

// Build categories from embedded data
const CATEGORIES = Object.entries(EMBEDDED_CATEGORIES).map(([fullName, images]) => ({
  fullName,
  shortName: getShortName(fullName),
  icon: getIcon(fullName),
  products: images.map(img => ({
    filename: img.filename,
    name: cleanProductName(img.filename),
    data: img.data
  }))
}));

function fmtBAM(v) { return (v||0).toFixed(2) + ' KM'; }
function fmtEUR(v) { return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(v||0); }

/* ── SPLASH SCREEN ── */
function SplashScreen({ onDone }) {
  const [fading, setFading] = useState(false);
  useEffect(() => {
    const t1 = setTimeout(() => setFading(true), 2000);
    const t2 = setTimeout(onDone, 2500);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);

  const sparkles = useMemo(() => Array.from({length:20}, (_,i) => ({
    i, left:5+Math.random()*90, top:5+Math.random()*90,
    size:3+Math.random()*7, delay:Math.random()*2.2, dur:1+Math.random()*1.5
  })), []);

  const leaves = useMemo(() => Array.from({length:10}, (_,i) => ({
    i, left:Math.random()*100, top:20+Math.random()*60,
    size:12+Math.random()*16, delay:0.2+Math.random()*1.8, dur:2+Math.random()*1.5,
    emoji:['🌿','🍃','🌱','☘️','🍀'][i%5]
  })), []);

  const blooms = useMemo(() => Array.from({length:8}, (_,i) => ({
    i, angle:i*45, dist:100+Math.random()*50, size:16+Math.random()*12, delay:0.6+i*0.12
  })), []);

  const splashDrops = useMemo(() => Array.from({length:8}, (_,i) => ({
    i, cx:80+Math.random()*140, cy:20+Math.random()*80, delay:i*0.4, dur:0.6
  })), []);

  return (
    <div style={{
      position:'fixed',inset:0,zIndex:9999,overflow:'hidden',
      background:'linear-gradient(160deg, #0a2e1a 0%, #0d3b2a 30%, #0e4a3a 60%, #0a3d3d 100%)',
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      animation: fading ? 'splashFadeOut 0.5s ease-in forwards' : 'none'
    }}>

      {/* Green sparkle particles */}
      {sparkles.map(s => (
        <div key={s.i} style={{
          position:'absolute',left:s.left+'%',top:s.top+'%',
          width:s.size,height:s.size,borderRadius:'50%',
          background:'radial-gradient(circle, rgba(134,239,172,0.95) 0%, rgba(74,222,128,0.3) 60%, transparent 80%)',
          boxShadow:'0 0 6px rgba(134,239,172,0.4)',
          animation:`sparkleGreen ${s.dur}s ease-in-out ${s.delay}s infinite`,pointerEvents:'none'
        }} />
      ))}

      {/* Floating leaves */}
      {leaves.map(l => (
        <div key={l.i} style={{
          position:'absolute',left:l.left+'%',top:l.top+'%',
          fontSize:l.size,opacity:0,
          animation:`leafDrift ${l.dur}s ease-in-out ${l.delay}s infinite`,pointerEvents:'none'
        }}>{l.emoji}</div>
      ))}

      {/* Blooming leaves around logo */}
      {blooms.map(bl => {
        const r=bl.angle*Math.PI/180;
        return (
          <div key={bl.i} style={{
            position:'absolute',
            left:`calc(50% + ${Math.cos(r)*bl.dist}px)`,
            top:`calc(42% + ${Math.sin(r)*bl.dist}px)`,
            fontSize:bl.size,opacity:0,
            animation:`leafBloom 1s ease-out ${bl.delay}s forwards`,pointerEvents:'none'
          }}>🌿</div>
        );
      })}

      {/* Logo image */}
      <div style={{
        width:'75vw',maxWidth:320,opacity:0,
        animation:'splashLogoScale 1s cubic-bezier(0.34,1.56,0.64,1) 0.15s forwards',
        filter:'drop-shadow(0 10px 50px rgba(134,239,172,0.35))'
      }}>
        <img src={typeof SPLASH_LOGO!=='undefined'?SPLASH_LOGO:''} alt="AGM"
          style={{width:'100%',height:'auto'}} />
      </div>

      {/* "A G M" text */}
      <div style={{
        fontFamily:'Inter,sans-serif',fontWeight:800,fontSize:72,color:'#fff',
        letterSpacing:8,lineHeight:1,marginTop:10,opacity:0,
        textShadow:'0 4px 30px rgba(134,239,172,0.3)',
        animation:'splashTextIn 0.8s ease-out 0.4s forwards'
      }}>A G M</div>

      {/* "ECOSOLUTIONS" subtitle */}
      <div style={{
        fontFamily:'Inter,sans-serif',fontWeight:300,fontSize:28,
        color:'#a7f3d0',letterSpacing:2,marginTop:4,opacity:0,
        animation:'splashTextIn 0.8s ease-out 0.7s forwards'
      }}>ECOSOLUTIONS</div>

      {/* Flowing River SVG */}
      <div style={{width:300,height:120,marginTop:20,position:'relative',overflow:'hidden',borderRadius:16,opacity:0,
        animation:'splashTextIn 0.8s ease-out 1s forwards'}}>
        <svg width="600" height="120" style={{position:'absolute',top:0,left:0,animation:'riverFlow 3s linear infinite'}}>
          <defs>
            <linearGradient id="waterGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stopColor="rgba(20,184,166,0.6)" />
              <stop offset="50%" stopColor="rgba(34,197,94,0.7)" />
              <stop offset="100%" stopColor="rgba(20,184,166,0.6)" />
            </linearGradient>
            <linearGradient id="waveHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stopColor="rgba(167,243,208,0.4)" />
              <stop offset="100%" stopColor="rgba(20,184,166,0.1)" />
            </linearGradient>
          </defs>
          {/* Main water body */}
          <path d="M0,50 Q30,30 60,50 T120,50 T180,50 T240,50 T300,50 T360,50 T420,50 T480,50 T540,50 T600,50 L600,120 L0,120 Z"
            fill="url(#waterGrad)" />
          {/* Wave highlight layer 1 */}
          <path d="M0,45 Q25,25 50,45 T100,45 T150,45 T200,45 T250,45 T300,45 T350,45 T400,45 T450,45 T500,45 T550,45 T600,45 L600,70 L0,70 Z"
            fill="url(#waveHighlight)" opacity="0.5" />
          {/* Wave highlight layer 2 */}
          <path d="M0,55 Q35,40 70,55 T140,55 T210,55 T280,55 T350,55 T420,55 T490,55 T560,55 T600,55 L600,85 L0,85 Z"
            fill="rgba(103,232,249,0.15)" />
          {/* Subtle foam dots */}
          {[30,90,150,210,270,330,390,450,510,570].map((cx,i) => (
            <circle key={i} cx={cx} cy={48+Math.sin(i)*5} r={1.5+Math.random()} fill="rgba(255,255,255,0.25)" />
          ))}
        </svg>

        {/* Splash droplets */}
        <svg width="300" height="120" style={{position:'absolute',top:0,left:0}}>
          {splashDrops.map(d => (
            <circle key={d.i} cx={d.cx} cy={d.cy} r="6" fill="none"
              stroke="rgba(167,243,208,0.7)" strokeWidth="1.5"
              style={{animation:`splashDrop ${d.dur}s ease-out ${d.delay}s infinite`}} />
          ))}
        </svg>
      </div>

      {/* Tagline */}
      <div style={{
        fontFamily:'Inter,sans-serif',fontWeight:300,fontSize:11,
        color:'rgba(167,243,208,0.4)',letterSpacing:4,textTransform:'uppercase',
        marginTop:20,opacity:0,animation:'splashTextIn 0.6s ease-out 1.3s forwards'
      }}>Wastewater Treatment Solutions</div>
    </div>
  );
}

/* ── HEADER ── */
function Header() {
  return (
    <header className="bg-gradient-to-r from-forest-950 via-forest-900 to-forest-950 px-5 py-4 flex items-center gap-4 sticky top-0 z-40 shadow-xl">
      {typeof AGM_LOGO_DATA !== 'undefined' && AGM_LOGO_DATA && (
        <img src={AGM_LOGO_DATA} className="w-12 h-12 rounded-xl object-contain bg-white/10 p-1" />
      )}
      <div className="flex-1 min-w-0">
        <h1 className="text-white font-extrabold text-xl tracking-tight leading-tight">AGM Eco Solutions</h1>
        <p className="text-forest-400 text-xs tracking-widest uppercase mt-0.5">Ponude / Offers</p>
      </div>
    </header>
  );
}

/* ── CATEGORY ACCORDION LIST ── */
function CategoryList({ onSelectProduct }) {
  const [openCat, setOpenCat] = useState(null);

  return (
    <div className="px-4 py-5 space-y-3">
      <h2 className="text-forest-800 font-bold text-lg mb-1 px-1">Kategorije proizvoda</h2>

      {CATEGORIES.map((cat, ci) => (
        <div key={ci} className="bg-white rounded-2xl border border-forest-100 shadow-sm overflow-hidden slide-up" style={{animationDelay: ci*0.05+'s'}}>
          {/* Category Header Button */}
          <button
            onClick={() => setOpenCat(openCat === ci ? null : ci)}
            className="w-full flex items-center gap-4 px-5 py-4 active:bg-forest-50 transition-colors"
          >
            <span className="text-2xl">{cat.icon}</span>
            <div className="flex-1 text-left">
              <div className="font-bold text-forest-900 text-base leading-tight">{cat.shortName}</div>
              <div className="text-sage-400 text-xs mt-0.5">{cat.products.length} proizvod{cat.products.length !== 1 ? 'a' : ''}</div>
            </div>
            <svg className={`w-5 h-5 text-sage-400 transition-transform duration-300 ${openCat===ci ? 'rotate-180' : ''}`}
              fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7"/>
            </svg>
          </button>

          {/* Products Grid */}
          {openCat === ci && (
            <div className="px-4 pb-4 pt-1 border-t border-forest-50 fade-in">
              <div className="grid grid-cols-2 gap-3">
                {cat.products.map((prod, pi) => (
                  <div key={pi}
                    onClick={() => onSelectProduct(prod, cat.shortName)}
                    className="bg-sage-50 rounded-2xl overflow-hidden cursor-pointer active:scale-95 transition-transform border border-sage-100 pop-in"
                    style={{animationDelay: pi*0.06+'s'}}>
                    <div className="aspect-square p-3 flex items-center justify-center bg-white">
                      <img src={prod.data} alt={prod.name} className="max-w-full max-h-full object-contain" />
                    </div>
                    <div className="px-3 py-3">
                      <p className="text-xs font-bold text-forest-800 leading-tight line-clamp-2">{prod.name}</p>
                      <div className="flex items-center gap-1.5 mt-2">
                        <div className="w-5 h-5 bg-forest-600 rounded-full flex items-center justify-center">
                          <svg className="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M12 4v16m8-8H4"/>
                          </svg>
                        </div>
                        <span className="text-[11px] text-forest-600 font-semibold">Dodaj u ponudu</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

/* ── OFFER PANEL (slide in from right) ── */
function OfferPanel({ items, setItems, onClose, onAddMore }) {
  const [company, setCompany] = useState(() => {
    try { return JSON.parse(localStorage.getItem('agm_company')) || {name:'',email:'',phone:'',website:'',vat:''}; } catch(e) { return {name:'',email:'',phone:'',website:'',vat:''}; }
  });
  const [customer, setCustomer] = useState({name:'',email:'',address:'',phone:''});
  const [notes, setNotes] = useState('');
  const [companyLogo, setCompanyLogo] = useState(null);
  const [currency, setCurrency] = useState('BAM');
  const [expandCompany, setExpandCompany] = useState(false);
  const [expandCustomer, setExpandCustomer] = useState(false);

  useEffect(() => { if(company.name) localStorage.setItem('agm_company', JSON.stringify(company)); }, [company]);

  const updateItem = (idx, field, val) => setItems(prev => prev.map((it,i) => i===idx ? {...it,[field]:val} : it));
  const removeItem = (idx) => setItems(prev => prev.filter((_,i) => i!==idx));

  const itemSub = (it) => it.quantity * it.price * (1 - (it.rebate||0)/100);
  const itemVatAmt = (it) => itemSub(it) * it.vatPercent / 100;
  const itemTotal = (it) => itemSub(it) + itemVatAmt(it);

  const grandSub = items.reduce((s,i) => s + itemSub(i), 0);
  const grandVat = items.reduce((s,i) => s + itemVatAmt(i), 0);
  const grandTotal = grandSub + grandVat;
  const fmt = (v) => currency === 'BAM' ? fmtBAM(v) : fmtEUR(v);

  const onLogoUpload = (e) => { const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>setCompanyLogo(r.result); r.readAsDataURL(f); };
  const uc = (f,v) => setCompany(p=>({...p,[f]:v}));
  const ucust = (f,v) => setCustomer(p=>({...p,[f]:v}));

  const generatePDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p','mm','a4');
    const W=210, mg=15;
    let y = mg;

    doc.setFillColor(20,83,45); doc.rect(0,0,W,34,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(20); doc.setFont('helvetica','bold');
    doc.text('PONUDA / OFFER', mg, 16);
    doc.setFontSize(9); doc.setFont('helvetica','normal');
    doc.text('AGM Eco Solutions', mg, 23);
    const today = new Date().toLocaleDateString('en-GB');
    const ref = 'AGM-' + Date.now().toString(36).toUpperCase();
    doc.text('Datum: ' + today + '  |  Ref: ' + ref, W-mg, 16, {align:'right'});
    doc.text('Valuta: ' + currency, W-mg, 23, {align:'right'});
    if(companyLogo){try{doc.addImage(companyLogo,'PNG',W-mg-24,3,24,24);}catch(e){}}
    y=44;

    doc.setTextColor(20,83,45); doc.setFontSize(10); doc.setFont('helvetica','bold');
    doc.text('OD / FROM:', mg, y); doc.text('ZA / TO:', W/2+5, y); y+=5;
    doc.setTextColor(60,60,60); doc.setFontSize(9); doc.setFont('helvetica','normal');
    const cl=[company.name,company.email,company.phone,company.website,company.vat?'PDV: '+company.vat:''].filter(Boolean);
    const cul=[customer.name,customer.email,customer.phone,customer.address].filter(Boolean);
    for(let i=0;i<Math.max(cl.length,cul.length);i++){if(cl[i])doc.text(cl[i],mg,y);if(cul[i])doc.text(cul[i],W/2+5,y);y+=5;}
    y+=6; doc.setDrawColor(20,83,45); doc.setLineWidth(0.5); doc.line(mg,y,W-mg,y); y+=6;

    doc.setFillColor(240,253,244); doc.rect(mg,y-4,W-mg*2,8,'F');
    doc.setTextColor(20,83,45); doc.setFontSize(8); doc.setFont('helvetica','bold');
    doc.text('#',mg+2,y); doc.text('Proizvod',mg+8,y); doc.text('Kol.',108,y); doc.text('Cijena',118,y); doc.text('Rabat',140,y); doc.text('PDV',155,y); doc.text('Ukupno',W-mg,y,{align:'right'}); y+=8;

    doc.setFont('helvetica','normal'); doc.setTextColor(50,50,50);
    items.forEach((item,idx)=>{
      if(y>260){doc.addPage();y=mg;}
      if(idx%2===0){doc.setFillColor(250,250,245);doc.rect(mg,y-4,W-mg*2,7,'F');}
      doc.setFontSize(8);
      doc.text(''+(idx+1),mg+2,y);
      const dn=item.name.length>32?item.name.substring(0,29)+'...':item.name;
      doc.text(dn,mg+8,y); doc.text(''+item.quantity,108,y); doc.text(fmt(item.price),118,y);
      doc.text((item.rebate||0)+'%',140,y); doc.text(item.vatPercent+'%',155,y);
      doc.text(fmt(itemTotal(item)),W-mg,y,{align:'right'}); y+=7;
      if(item.description){doc.setFontSize(7);doc.setTextColor(120,120,120);doc.splitTextToSize(item.description,90).slice(0,2).forEach(l=>{doc.text(l,mg+8,y);y+=3.5;});doc.setTextColor(50,50,50);}
    });
    y+=4; doc.line(mg,y,W-mg,y); y+=7;
    doc.setFontSize(10); doc.setFont('helvetica','normal');
    doc.text('Podzbroj:',125,y); doc.text(fmt(grandSub),W-mg,y,{align:'right'}); y+=6;
    doc.text('PDV:',125,y); doc.text(fmt(grandVat),W-mg,y,{align:'right'}); y+=6;
    doc.setFillColor(20,83,45); doc.rect(120,y-5,W-mg-120,12,'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(12);
    doc.text('UKUPNO:',125,y+2); doc.text(fmt(grandTotal),W-mg-2,y+2,{align:'right'}); y+=18;
    if(notes){if(y>260){doc.addPage();y=mg;}doc.setTextColor(20,83,45);doc.setFontSize(10);doc.setFont('helvetica','bold');doc.text('Napomene:',mg,y);y+=6;doc.setTextColor(80,80,80);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.splitTextToSize(notes,W-mg*2).forEach(l=>{if(y>285){doc.addPage();y=mg;}doc.text(l,mg,y);y+=4;});}
    doc.setTextColor(150,150,150);doc.setFontSize(7);doc.text('AGM Eco Solutions',W/2,290,{align:'center'});
    doc.save('Ponuda_'+(customer.name||'Kupac')+'_'+today.replace(/\//g,'-')+'.pdf');
  };

  return (
    <div className="fixed inset-0 z-50 bg-sage-50 overflow-y-auto slide-left">
      {/* Header */}
      <div className="bg-gradient-to-r from-forest-900 to-forest-950 px-5 py-4 flex items-center gap-4 sticky top-0 z-10 shadow-lg">
        <button onClick={onClose} className="w-11 h-11 bg-white/10 rounded-xl flex items-center justify-center active:bg-white/20">
          <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <div className="flex-1">
          <h2 className="text-white font-bold text-lg">Ponuda</h2>
          <p className="text-forest-400 text-xs">{items.length} proizvod{items.length!==1?'a':''}</p>
        </div>
        <button onClick={()=>setCurrency(c=>c==='BAM'?'EUR':'BAM')}
          className="px-4 py-2 bg-white/10 rounded-xl text-forest-300 text-sm font-bold active:bg-white/20">{currency}</button>
      </div>

      <div className="px-4 py-5 space-y-4">
        {/* Company */}
        <div className="bg-white rounded-2xl border border-sage-100 overflow-hidden shadow-sm">
          <button onClick={()=>setExpandCompany(!expandCompany)} className="w-full flex items-center justify-between px-5 py-4">
            <span className="font-bold text-forest-800 text-base flex items-center gap-2">🏢 Firma</span>
            <svg className={`w-5 h-5 text-sage-400 transition-transform ${expandCompany?'rotate-180':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
          </button>
          {expandCompany && (
            <div className="px-5 pb-5 space-y-3 border-t border-sage-100 pt-4 slide-up">
              <Inp label="Naziv firme" value={company.name} onChange={v=>uc('name',v)} placeholder="AGM Eco Solutions" />
              <div><label className="block text-xs font-semibold text-sage-500 uppercase mb-1.5">Logo</label>
                <label className="flex items-center gap-2 px-4 py-3.5 bg-sage-50 border border-sage-200 rounded-xl cursor-pointer text-sm text-sage-500">📎 {companyLogo?'Uploadovan ✓':'Upload logo...'}<input type="file" accept="image/*" onChange={onLogoUpload} className="hidden"/></label>
              </div>
              <Inp label="Email" value={company.email} onChange={v=>uc('email',v)} type="email" placeholder="info@agm.ba" />
              <Inp label="Telefon" value={company.phone} onChange={v=>uc('phone',v)} type="tel" placeholder="+387 00 000 000" />
              <Inp label="Web" value={company.website} onChange={v=>uc('website',v)} placeholder="www.agm.ba" />
              <Inp label="PDV broj" value={company.vat} onChange={v=>uc('vat',v)} placeholder="PDV/ID" />
            </div>
          )}
        </div>

        {/* Customer */}
        <div className="bg-white rounded-2xl border border-sage-100 overflow-hidden shadow-sm">
          <button onClick={()=>setExpandCustomer(!expandCustomer)} className="w-full flex items-center justify-between px-5 py-4">
            <span className="font-bold text-forest-800 text-base flex items-center gap-2">👤 Kupac</span>
            <svg className={`w-5 h-5 text-sage-400 transition-transform ${expandCustomer?'rotate-180':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
          </button>
          {expandCustomer && (
            <div className="px-5 pb-5 space-y-3 border-t border-sage-100 pt-4 slide-up">
              <Inp label="Ime kupca" value={customer.name} onChange={v=>ucust('name',v)} placeholder="Ime / Firma" />
              <Inp label="Email" value={customer.email} onChange={v=>ucust('email',v)} type="email" placeholder="kupac@email.com" />
              <Inp label="Telefon" value={customer.phone} onChange={v=>ucust('phone',v)} type="tel" placeholder="+387..." />
              <Inp label="Adresa" value={customer.address} onChange={v=>ucust('address',v)} placeholder="Adresa" />
            </div>
          )}
        </div>

        {/* Items */}
        <div>
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-bold text-forest-800 text-base">Proizvodi ({items.length})</h3>
            <button onClick={onAddMore}
              className="flex items-center gap-2 bg-forest-700 text-white px-5 py-2.5 rounded-full text-sm font-bold active:scale-95 transition-transform shadow-lg">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M12 4v16m8-8H4"/>
              </svg>
              Dodaj
            </button>
          </div>
          <div className="space-y-4">
            {items.map((item,idx) => (
              <div key={item.id} className="bg-white rounded-2xl border border-sage-100 p-5 slide-up relative shadow-sm">
                <button onClick={()=>removeItem(idx)} className="absolute top-3 right-3 w-8 h-8 bg-red-50 text-red-400 rounded-full flex items-center justify-center active:bg-red-100 z-10">
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
                <div className="flex gap-4 mb-4">
                  <div className="w-24 h-24 bg-sage-50 rounded-xl overflow-hidden flex items-center justify-center flex-shrink-0 border border-sage-100">
                    <img src={item.imgData} alt={item.name} className="max-w-full max-h-full object-contain" />
                  </div>
                  <div className="flex-1 min-w-0 pr-6">
                    <input value={item.name} onChange={e=>updateItem(idx,'name',e.target.value)}
                      className="w-full font-bold text-forest-900 text-base bg-transparent border-b-2 border-sage-200 pb-1.5 focus:outline-none focus:border-forest-500" />
                    <p className="text-xs text-sage-400 mt-1">{item.category}</p>
                    <textarea value={item.description} onChange={e=>updateItem(idx,'description',e.target.value)}
                      placeholder="Opis..." rows={2}
                      className="w-full mt-2 text-sm text-sage-600 bg-sage-50 border border-sage-200 rounded-xl p-3 focus:outline-none focus:border-forest-400 resize-none" />
                  </div>
                </div>
                <div className="grid grid-cols-4 gap-2.5 mb-4">
                  <div><label className="block text-[10px] font-bold text-sage-500 uppercase mb-1.5">Kol.</label>
                    <input type="number" min="1" value={item.quantity} onChange={e=>updateItem(idx,'quantity',parseInt(e.target.value)||1)}
                      className="w-full px-3 py-3 bg-sage-50 border border-sage-200 rounded-xl text-forest-900 text-base font-semibold focus:outline-none focus:border-forest-500 text-center" /></div>
                  <div><label className="block text-[10px] font-bold text-sage-500 uppercase mb-1.5">Cijena</label>
                    <input type="number" min="0" step="0.01" value={item.price||''} onChange={e=>updateItem(idx,'price',parseFloat(e.target.value)||0)} placeholder="0"
                      className="w-full px-3 py-3 bg-sage-50 border border-sage-200 rounded-xl text-forest-900 text-base font-semibold focus:outline-none focus:border-forest-500 text-center" /></div>
                  <div><label className="block text-[10px] font-bold text-sage-500 uppercase mb-1.5">PDV %</label>
                    <input type="number" min="0" max="100" value={item.vatPercent} onChange={e=>updateItem(idx,'vatPercent',parseFloat(e.target.value)||0)}
                      className="w-full px-3 py-3 bg-sage-50 border border-sage-200 rounded-xl text-forest-900 text-base font-semibold focus:outline-none focus:border-forest-500 text-center" /></div>
                  <div><label className="block text-[10px] font-bold text-sage-500 uppercase mb-1.5">Rabat %</label>
                    <input type="number" min="0" max="100" value={item.rebate||''} onChange={e=>updateItem(idx,'rebate',parseFloat(e.target.value)||0)} placeholder="0"
                      className="w-full px-3 py-3 bg-sage-50 border border-sage-200 rounded-xl text-forest-900 text-base font-semibold focus:outline-none focus:border-forest-500 text-center" /></div>
                </div>
                <div className="flex items-center justify-between px-2 pt-3 border-t-2 border-sage-100">
                  <span className="text-xs text-sage-500">Iznos: <strong className="text-forest-800">{fmt(itemSub(item))}</strong></span>
                  <span className="text-xs text-sage-500">PDV: <strong className="text-forest-800">{fmt(itemVatAmt(item))}</strong></span>
                  <span className="text-base font-bold text-forest-700">{fmt(itemTotal(item))}</span>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Notes */}
        <div className="bg-white rounded-2xl border border-sage-100 p-5 shadow-sm">
          <label className="block text-xs font-bold text-sage-500 uppercase tracking-wider mb-2">Napomene</label>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={3} placeholder="Uslovi, rok isporuke..."
            className="w-full px-4 py-3 bg-sage-50 border border-sage-200 rounded-xl text-forest-900 placeholder-sage-400 focus:outline-none focus:border-forest-500 resize-none text-base" />
        </div>

        {/* Totals */}
        <div className="bg-gradient-to-br from-forest-800 to-forest-950 rounded-2xl p-6 text-white shadow-2xl">
          <div className="flex items-center justify-between mb-3">
            <p className="text-forest-400 text-xs uppercase tracking-widest font-semibold">Ukupno</p>
            <span className="text-forest-400 text-sm font-bold">{currency}</span>
          </div>
          <div className="space-y-2 mb-4">
            <div className="flex justify-between text-base"><span className="text-forest-300">Podzbroj</span><span className="font-semibold">{fmt(grandSub)}</span></div>
            <div className="flex justify-between text-base"><span className="text-forest-300">PDV</span><span className="font-semibold">{fmt(grandVat)}</span></div>
            <div className="flex justify-between text-xl font-bold pt-3 border-t border-forest-700">
              <span className="text-white">UKUPNO</span>
              <span className="text-forest-300">{fmt(grandTotal)}</span>
            </div>
          </div>
          <div className="flex gap-3 mt-5">
            <button onClick={generatePDF}
              className="flex-1 bg-forest-500 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 text-base active:scale-95 transition-transform shadow-lg">
              <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
              PDF Ponuda
            </button>
            <button onClick={()=>{setItems([]);setNotes('');}}
              className="bg-white/10 text-white font-semibold px-6 py-4 rounded-2xl text-base active:scale-95">Brisi</button>
          </div>
        </div>
        <div className="h-8" />
      </div>
    </div>
  );
}

function Inp({ label, value, onChange, type='text', placeholder='' }) {
  return (
    <div>
      <label className="block text-xs font-bold text-sage-500 uppercase tracking-wider mb-1.5">{label}</label>
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        className="w-full px-4 py-3.5 bg-sage-50 border border-sage-200 rounded-xl text-forest-900 placeholder-sage-400 focus:outline-none focus:border-forest-500 focus:bg-white transition-all text-base" />
    </div>
  );
}

/* ── MAIN APP ── */
function App() {
  const [splash, setSplash] = useState(true);
  const [offerItems, setOfferItems] = useState([]);
  const [showOffer, setShowOffer] = useState(false);
  let idRef = useRef(0);

  const addProduct = useCallback((prod, categoryName) => {
    setOfferItems(prev => [...prev, {
      id: ++idRef.current,
      name: prod.name,
      imgData: prod.data,
      category: categoryName,
      description: '',
      quantity: 1,
      price: 0,
      vatPercent: 17,
      rebate: 0
    }]);
    setShowOffer(true);
  }, []);

  return (
    <div className="min-h-screen flex flex-col">
      {splash && <SplashScreen onDone={() => setSplash(false)} />}
      <Header />
      <CategoryList onSelectProduct={addProduct} />

      {/* Floating offer button */}
      {offerItems.length > 0 && !showOffer && (
        <button onClick={()=>setShowOffer(true)}
          className="fixed bottom-6 right-5 bg-forest-700 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 active:scale-95 transition-transform z-40 pop-in"
          style={{boxShadow:'0 8px 30px rgba(20,83,45,0.5)'}}>
          <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          <span className="font-bold text-base">Ponuda</span>
          <span className="bg-white text-forest-800 text-sm font-bold w-7 h-7 rounded-full flex items-center justify-center">{offerItems.length}</span>
        </button>
      )}

      {showOffer && (
        <OfferPanel items={offerItems} setItems={setOfferItems} onClose={()=>setShowOffer(false)} onAddMore={()=>setShowOffer(false)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
