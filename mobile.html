<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: {50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d',800:'#166534',900:'#14532d',950:'#052e16'},
            sage: {50:'#f6f7f4',100:'#e8ebe3',200:'#d2d8c8',300:'#b3bda3',400:'#94a17e',500:'#788964'}
          }
        }

    }
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#f6f7f4;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
    input,textarea,select{font-family:inherit;font-size:16px!important}
    input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    input[type="number"]{-moz-appearance:textfield}
    @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes popIn{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
    .slide-up{animation:slideUp 0.3s ease-out}
    .fade-in{animation:fadeIn 0.25s ease-out}
    .pop-in{animation:popIn 0.25s ease-out}
    .added-flash{animation:shake 0.3s ease-out}
    ::-webkit-scrollbar{width:0;background:transparent}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

function cleanName(f) {
  let n = f.replace(/\.[^/.]+$/, '');
  n = n.replace(/-[A-Za-z0-9_-]{16,}$/, '');
  n = n.replace(/_clipped_rev_1/gi, '');
  n = n.replace(/-Copy\d*/gi, '');
  n = n.replace(/_/g, ' ').replace(/\./g, ' ').replace(/-+/g, ' ').replace(/\s+/g, ' ').trim();
  return n || f;
}

const PRODUCTS = RAW_FILES.map(f => ({ filename: f, name: cleanName(f), path: IMAGE_FOLDER + f }));

function currency(v) {
  return new Intl.NumberFormat('de-DE', { style:'currency', currency:'EUR' }).format(v || 0);
}

/* ── COMPONENTS ── */

function Header({ logoUrl }) {
  return (
    <header className="bg-gradient-to-r from-forest-900 via-forest-800 to-forest-900 px-4 py-3 flex items-center gap-3 sticky top-0 z-50 shadow-lg">
      <div className="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center text-xl backdrop-blur-sm">♻</div>
      <div className="flex-1 min-w-0">
        <h1 className="text-white font-extrabold text-lg tracking-tight leading-tight">AGM Offers</h1>
        <p className="text-forest-400 text-[10px] tracking-widest uppercase">Wastewater Equipment</p>

function SearchBar({ value, onChange }) {
  return (
    <div className="sticky top-[58px] z-40 bg-sage-50/95 backdrop-blur-md px-4 py-3 border-b border-forest-100">
      <div className="relative">
        <svg className="absolute left-3.5 top-1/2 -translate-y-1/2 w-5 h-5 text-forest-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input
          value={value}
          onChange={e => onChange(e.target.value)}
          placeholder="Search products..."
          className="w-full pl-11 pr-10 py-3.5 bg-white border-2 border-forest-100 rounded-2xl text-forest-900 placeholder-sage-400 focus:outline-none focus:border-forest-500 shadow-sm text-base"
        />
        {value && (

            <svg className="w-4 h-4 text-sage-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">

function ProductGrid({ products, onAdd }) {
  const [flashId, setFlashId] = useState(null);

  const handleAdd = (p) => {
    setFlashId(p.filename);
    onAdd(p);
    setTimeout(() => setFlashId(null), 400);
  };

  if (products.length === 0) {
    return (
      <div className="text-center py-16 px-4 fade-in">
        <div className="text-5xl mb-3">🔍</div>
        <p className="text-sage-500 font-medium">No products found</p>
        <p className="text-sage-400 text-sm mt-1">Try a different keyword</p>
      </div>
    );
  }

  return (
    <div className="px-3 py-4">
      <p className="text-sage-500 text-xs font-medium mb-3 px-1">{products.length} product{products.length !== 1 ? 's' : ''}</p>
      <div className="grid grid-cols-3 gap-2.5">
        {products.map(p => (
          <div key={p.filename}
            onClick={() => handleAdd(p)}
            className={`bg-white rounded-2xl overflow-hidden border border-forest-50 shadow-sm active:scale-95 transition-transform cursor-pointer ${flashId === p.filename ? 'added-flash' : ''}`}>
            <div className="aspect-square bg-sage-50 p-1.5 flex items-center justify-center">
              <img src={p.path} alt={p.name} className="max-w-full max-h-full object-contain" loading="lazy" />
            </div>
            <div className="px-2 py-2">
              <p className="text-[10px] font-semibold text-forest-800 leading-tight line-clamp-2">{p.name}</p>
              <div className="flex items-center gap-1 mt-1.5">

                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M12 4v16m8-8H4"/>
                </svg>
                <span className="text-[9px] text-forest-500 font-semibold uppercase tracking-wider">Add</span>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function OfferItem({ item, index, onChange, onRemove }) {
  const update = (field, val) => onChange(index, { ...item, [field]: val });

  const sub = item.quantity * item.price;
  const vat = sub * item.vatPercent / 100;
  const total = sub + vat;

  return (
    <div className="bg-white rounded-2xl border border-sage-100 p-4 slide-up relative">
      <button onClick={() => onRemove(index)}
        className="absolute top-2 right-2 w-7 h-7 bg-red-50 text-red-400 rounded-full flex items-center justify-center active:bg-red-100 z-10">
        <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>

      <div className="flex gap-3 mb-3">
        <div className="w-20 h-20 bg-sage-50 rounded-xl overflow-hidden flex items-center justify-center flex-shrink-0">
          <img src={item.path} alt={item.name} className="max-w-full max-h-full object-contain" />
        </div>
        <div className="flex-1 min-w-0 pr-6">
          <input value={item.name} onChange={e => update('name', e.target.value)}
            className="w-full font-bold text-forest-900 text-sm bg-transparent border-b border-sage-200 pb-1 focus:outline-none focus:border-forest-500 transition-colors" />
          <textarea value={item.description} onChange={e => update('description', e.target.value)}
            placeholder="Description..."
            rows={2}
            className="w-full mt-2 text-xs text-sage-600 bg-sage-50 border border-sage-200 rounded-lg p-2 focus:outline-none focus:border-forest-400 resize-none" />
        </div>
      </div>

      <div className="grid grid-cols-3 gap-2 mb-3">
        <div>
          <label className="block text-[10px] font-semibold text-sage-500 uppercase tracking-wider mb-1">Qty</label>
          <input type="number" min="1" value={item.quantity} onChange={e => update('quantity', parseInt(e.target.value) || 1)}
            className="w-full px-3 py-2.5 bg-sage-50 border border-sage-200 rounded-xl text-forest-900 text-sm focus:outline-none focus:border-forest-500" />
        </div>
        <div>
          <label className="block text-[10px] font-semibold text-sage-500 uppercase tracking-wider mb-1">Price €</label>
          <input type="number" min="0" step="0.01" value={item.price || ''} onChange={e => update('price', parseFloat(e.target.value) || 0)}
            placeholder="0.00"
            className="w-full px-3 py-2.5 bg-sage-50 border border-sage-200 rounded-xl text-forest-900 text-sm focus:outline-none focus:border-forest-500" />
        </div>
        <div>
          <label className="block text-[10px] font-semibold text-sage-500 uppercase tracking-wider mb-1">VAT %</label>
          <input type="number" min="0" max="100" value={item.vatPercent} onChange={e => update('vatPercent', parseFloat(e.target.value) || 0)}
            className="w-full px-3 py-2.5 bg-sage-50 border border-sage-200 rounded-xl text-forest-900 text-sm focus:outline-none focus:border-forest-500" />
        </div>
      </div>

      <div className="flex items-center justify-between px-1 pt-2 border-t border-sage-100">
        <span className="text-[11px] text-sage-500">Sub: <strong className="text-forest-800">{currency(sub)}</strong></span>
        <span className="text-[11px] text-sage-500">VAT: <strong className="text-forest-800">{currency(vat)}</strong></span>
        <span className="text-sm font-bold text-forest-700">{currency(total)}</span>
      </div>
    </div>
  );
}

function InputField({ label, value, onChange, type='text', placeholder='' }) {
  return (
    <div>
      <label className="block text-[10px] font-semibold text-sage-500 uppercase tracking-wider mb-1">{label}</label>
      <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
        className="w-full px-3.5 py-3 bg-sage-50 border border-sage-200 rounded-xl text-forest-900 placeholder-sage-400 focus:outline-none focus:border-forest-500 focus:bg-white transition-all" />
    </div>
  );
}

/* ── MAIN APP ── */
function App() {
  const [search, setSearch] = useState('');
  const [items, setItems] = useState([]);
  const [company, setCompany] = useState({ name:'', email:'', phone:'', website:'', vat:'' });
  const [customer, setCustomer] = useState({ name:'', email:'', address:'', phone:'' });
  const [companyLogo, setCompanyLogo] = useState(null);
  const [notes, setNotes] = useState('');
  const [showCompany, setShowCompany] = useState(false);
  const [showCustomer, setShowCustomer] = useState(false);
  const [tab, setTab] = useState('catalog'); // catalog | offer
  const offerRef = useRef(null);
  let idRef = useRef(0);

  const filtered = useMemo(() => {
    if (!search.trim()) return PRODUCTS;
    const q = search.toLowerCase();
    return PRODUCTS.filter(p => p.name.toLowerCase().includes(q) || p.filename.toLowerCase().includes(q));
  }, [search]);

  const addProduct = useCallback((p) => {
    const newItem = {
      id: ++idRef.current,
      filename: p.filename,
      name: p.name,
      path: p.path,
      description: '',
      quantity: 1,
      price: 0,
      vatPercent: 17
    };
    setItems(prev => [...prev, newItem]);
    setTab('offer');
    setTimeout(() => {
      document.getElementById('offer-bottom')?.scrollIntoView({ behavior:'smooth' });
    }, 150);
  }, []);

  const updateItem = useCallback((idx, updated) => {
    setItems(prev => prev.map((it, i) => i === idx ? updated : it));
  }, []);

  const removeItem = useCallback((idx) => {
    setItems(prev => prev.filter((_, i) => i !== idx));
  }, []);

  const grandSub = items.reduce((s, i) => s + i.quantity * i.price, 0);
  const grandVat = items.reduce((s, i) => s + i.quantity * i.price * i.vatPercent / 100, 0);
  const grandTotal = grandSub + grandVat;

  const onLogoUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = () => setCompanyLogo(r.result);
    r.readAsDataURL(file);
  };

  const updateCompany = (field, val) => setCompany(prev => ({ ...prev, [field]: val }));
  const updateCustomer = (field, val) => setCustomer(prev => ({ ...prev, [field]: val }));

  /* ── PDF GENERATION ── */
  const generatePDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p','mm','a4');
    const W=210, margin=15;
    let y = margin;

    // Header
    doc.setFillColor(20,83,45);
    doc.rect(0,0,W,32,'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(18);
    doc.setFont('helvetica','bold');
    doc.text('OFFER', margin, 15);
    doc.setFontSize(9);
    doc.setFont('helvetica','normal');
    doc.text('Wastewater Treatment Equipment', margin, 22);
    const today = new Date().toLocaleDateString('en-GB');
    const ref = 'OFF-' + Date.now().toString(36).toUpperCase();
    doc.text(`Date: ${today}  |  Ref: ${ref}`, W-margin, 15, {align:'right'});

    if (companyLogo) { try { doc.addImage(companyLogo,'PNG',W-margin-22,4,22,22); } catch(e){} }

    y = 42;

    // From / To
    doc.setTextColor(20,83,45);
    doc.setFontSize(10);
    doc.setFont('helvetica','bold');
    doc.text('FROM:', margin, y);
    doc.text('TO:', W/2+5, y);
    y += 5;
    doc.setTextColor(60,60,60);
    doc.setFontSize(9);
    doc.setFont('helvetica','normal');
    const cl = [company.name,company.email,company.phone,company.website,company.vat?`VAT: ${company.vat}`:''  ].filter(Boolean);
    const cul = [customer.name,customer.email,customer.phone,customer.address].filter(Boolean);
    const mx = Math.max(cl.length,cul.length);
    for(let i=0;i<mx;i++){
      if(cl[i]) doc.text(cl[i],margin,y);
      if(cul[i]) doc.text(cul[i],W/2+5,y);
      y+=5;
    }
    y+=6;

    // Line
    doc.setDrawColor(20,83,45); doc.setLineWidth(0.5); doc.line(margin,y,W-margin,y); y+=6;

    // Table header
    doc.setFillColor(240,253,244); doc.rect(margin,y-4,W-margin*2,8,'F');
    doc.setTextColor(20,83,45); doc.setFontSize(8); doc.setFont('helvetica','bold');
    doc.text('#',margin+2,y); doc.text('Product',margin+10,y);
    doc.text('Qty',120,y); doc.text('Price',135,y); doc.text('VAT%',155,y);
    doc.text('Total',W-margin,y,{align:'right'}); y+=8;

    // Rows
    doc.setFont('helvetica','normal'); doc.setTextColor(50,50,50);
    items.forEach((item,idx) => {
      if(y>260) { doc.addPage(); y=margin; }
      if(idx%2===0){ doc.setFillColor(250,250,245); doc.rect(margin,y-4,W-margin*2,7,'F'); }
      doc.setFontSize(8);
      doc.text(`${idx+1}`,margin+2,y);
      const dn = item.name.length>40 ? item.name.substring(0,37)+'...' : item.name;
      doc.text(dn,margin+10,y);
      doc.text(`${item.quantity}`,120,y);
      doc.text(currency(item.price),135,y);
      doc.text(`${item.vatPercent}%`,155,y);
      const t = item.quantity*item.price*(1+item.vatPercent/100);
      doc.text(currency(t),W-margin,y,{align:'right'});
      y+=7;
      if(item.description){
        doc.setFontSize(7); doc.setTextColor(120,120,120);
        doc.splitTextToSize(item.description,100).slice(0,2).forEach(l=>{doc.text(l,margin+10,y);y+=4;});
        doc.setTextColor(50,50,50);
      }
    });

    y+=4; doc.line(margin,y,W-margin,y); y+=7;

    // Totals
    doc.setFontSize(10); doc.setFont('helvetica','normal');
    doc.text('Subtotal:',130,y); doc.text(currency(grandSub),W-margin,y,{align:'right'}); y+=6;
    doc.text('Total VAT:',130,y); doc.text(currency(grandVat),W-margin,y,{align:'right'}); y+=6;
    doc.setFillColor(20,83,45); doc.rect(125,y-5,W-margin-125,10,'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(11);
    doc.text('GRAND TOTAL:',130,y+1); doc.text(currency(grandTotal),W-margin-2,y+1,{align:'right'});
    y+=15;

    // Notes
    if(notes){
      if(y>260){doc.addPage();y=margin;}
      doc.setTextColor(20,83,45); doc.setFontSize(10); doc.setFont('helvetica','bold');
      doc.text('Notes:',margin,y); y+=6;
      doc.setTextColor(80,80,80); doc.setFontSize(8); doc.setFont('helvetica','normal');
      doc.splitTextToSize(notes,W-margin*2).forEach(l=>{if(y>285){doc.addPage();y=margin;}doc.text(l,margin,y);y+=4;});
    }

    doc.setTextColor(150,150,150); doc.setFontSize(7);
    doc.text('Generated by AGM Offer Generator',W/2,290,{align:'center'});
    doc.save(`Offer_${customer.name||'Customer'}_${today.replace(/\//g,'-')}.pdf`);
  };

  return (
    <div className="min-h-screen flex flex-col">
      <Header logoUrl={companyLogo} />

      {/* Tab Bar */}
      <div className="flex bg-white border-b border-sage-200 sticky top-[58px] z-40">
        <button onClick={() => setTab('catalog')}
          className={`flex-1 py-3 text-sm font-semibold text-center transition-colors relative ${tab==='catalog' ? 'text-forest-700' : 'text-sage-400'}`}>
          Catalog
          {tab==='catalog' && <div className="absolute bottom-0 left-4 right-4 h-[3px] bg-forest-600 rounded-full"/>}
        </button>
        <button onClick={() => setTab('offer')}
          className={`flex-1 py-3 text-sm font-semibold text-center transition-colors relative ${tab==='offer' ? 'text-forest-700' : 'text-sage-400'}`}>
          Offer {items.length > 0 && <span className="ml-1 bg-forest-600 text-white text-[10px] px-1.5 py-0.5 rounded-full">{items.length}</span>}
          {tab==='offer' && <div className="absolute bottom-0 left-4 right-4 h-[3px] bg-forest-600 rounded-full"/>}
        </button>
      </div>

      {/* CATALOG TAB */}
      {tab === 'catalog' && (
        <div className="flex-1">
          <SearchBar value={search} onChange={setSearch} />
          <ProductGrid products={filtered} onAdd={addProduct} />
        </div>
      )}

      {/* OFFER TAB */}
      {tab === 'offer' && (
        <div className="flex-1 px-4 py-4 space-y-4" ref={offerRef}>

          {items.length === 0 ? (
            <div className="text-center py-20 fade-in">
              <div className="text-5xl mb-4">📋</div>
              <p className="text-sage-600 font-semibold text-lg">No products yet</p>
              <p className="text-sage-400 text-sm mt-1 mb-6">Go to Catalog to add products</p>
              <button onClick={() => setTab('catalog')}
                className="bg-forest-700 text-white px-6 py-3 rounded-2xl font-semibold text-sm active:scale-95 transition-transform">
                Browse Catalog
              </button>
            </div>
          ) : (
            <>
              {/* Company Info Accordion */}
              <div className="bg-white rounded-2xl border border-sage-100 overflow-hidden shadow-sm">
                <button onClick={() => setShowCompany(!showCompany)}
                  className="w-full flex items-center justify-between px-4 py-3.5">
                  <span className="font-bold text-forest-800 text-sm flex items-center gap-2">
                    <span className="text-base">🏢</span> Company Info
                  </span>
                  <svg className={`w-4 h-4 text-sage-400 transition-transform ${showCompany?'rotate-180':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/>
                  </svg>
                </button>
                {showCompany && (
                  <div className="px-4 pb-4 space-y-3 slide-up border-t border-sage-100 pt-3">
                    <InputField label="Company Name" value={company.name} onChange={v => updateCompany('name',v)} placeholder="Your company" />
                    <div>
                      <label className="block text-[10px] font-semibold text-sage-500 uppercase tracking-wider mb-1">Logo</label>
                      <label className="flex items-center gap-2 px-3.5 py-3 bg-sage-50 border border-sage-200 rounded-xl cursor-pointer text-sm text-sage-500 active:bg-sage-100">
                        📎 {companyLogo ? 'Logo uploaded ✓' : 'Upload logo...'}
                        <input type="file" accept="image/*" onChange={onLogoUpload} className="hidden" />
                      </label>
                    </div>
                    <InputField label="Email" value={company.email} onChange={v => updateCompany('email',v)} type="email" placeholder="info@company.com" />
                    <InputField label="Phone" value={company.phone} onChange={v => updateCompany('phone',v)} type="tel" placeholder="+387 00 000 000" />
                    <InputField label="Website" value={company.website} onChange={v => updateCompany('website',v)} placeholder="www.company.com" />
                    <InputField label="VAT Number" value={company.vat} onChange={v => updateCompany('vat',v)} placeholder="VAT/ID number" />
                  </div>
                )}
              </div>

              {/* Customer Info Accordion */}
              <div className="bg-white rounded-2xl border border-sage-100 overflow-hidden shadow-sm">
                <button onClick={() => setShowCustomer(!showCustomer)}
                  className="w-full flex items-center justify-between px-4 py-3.5">
                  <span className="font-bold text-forest-800 text-sm flex items-center gap-2">
                    <span className="text-base">👤</span> Customer Info
                  </span>
                  <svg className={`w-4 h-4 text-sage-400 transition-transform ${showCustomer?'rotate-180':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/>
                  </svg>
                </button>
                {showCustomer && (
                  <div className="px-4 pb-4 space-y-3 slide-up border-t border-sage-100 pt-3">
                    <InputField label="Customer Name" value={customer.name} onChange={v => updateCustomer('name',v)} placeholder="Customer / Company" />
                    <InputField label="Email" value={customer.email} onChange={v => updateCustomer('email',v)} type="email" placeholder="customer@email.com" />
                    <InputField label="Phone" value={customer.phone} onChange={v => updateCustomer('phone',v)} type="tel" placeholder="+387 00 000 000" />
                    <InputField label="Address" value={customer.address} onChange={v => updateCustomer('address',v)} placeholder="Full address" />
                  </div>
                )}
              </div>

              {/* Product Items */}
              <div>
                <div className="flex items-center justify-between mb-3">
                  <h3 className="font-bold text-forest-800 text-sm">Products ({items.length})</h3>
                  <button onClick={() => setTab('catalog')}
                    className="flex items-center gap-1 bg-forest-700 text-white px-4 py-2 rounded-full text-xs font-semibold active:scale-95 transition-transform shadow-md">
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M12 4v16m8-8H4"/>
                    </svg>
                    Add Product
                  </button>
                </div>
                <div className="space-y-3">
                  {items.map((item, i) => (
                    <OfferItem key={item.id} item={item} index={i} onChange={updateItem} onRemove={removeItem} />
                  ))}
                </div>
              </div>

              {/* Notes */}
              <div className="bg-white rounded-2xl border border-sage-100 p-4 shadow-sm">
                <label className="block text-[10px] font-semibold text-sage-500 uppercase tracking-wider mb-2">Notes & Terms</label>
                <textarea value={notes} onChange={e => setNotes(e.target.value)} rows={3}
                  placeholder="Payment terms, delivery conditions..."
                  className="w-full px-3.5 py-3 bg-sage-50 border border-sage-200 rounded-xl text-forest-900 placeholder-sage-400 focus:outline-none focus:border-forest-500 resize-none text-sm" />
              </div>

              {/* Totals & PDF */}
              <div className="bg-gradient-to-br from-forest-800 to-forest-950 rounded-2xl p-5 text-white shadow-xl">
                <p className="text-forest-400 text-[10px] uppercase tracking-widest mb-2">Summary</p>
                <div className="space-y-1 mb-3">
                  <div className="flex justify-between text-sm">
                    <span className="text-forest-300">Subtotal</span>
                    <span className="font-semibold">{currency(grandSub)}</span>
                  </div>
                  <div className="flex justify-between text-sm">
                    <span className="text-forest-300">VAT</span>
                    <span className="font-semibold">{currency(grandVat)}</span>
                  </div>
                  <div className="flex justify-between text-lg font-bold pt-2 border-t border-forest-700">
                    <span className="text-forest-100">Grand Total</span>
                    <span className="text-forest-300">{currency(grandTotal)}</span>
                  </div>
                </div>
                <div className="flex gap-2 mt-4">
                  <button onClick={generatePDF}
                    className="flex-1 bg-forest-500 hover:bg-forest-400 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 text-sm active:scale-95 transition-transform shadow-lg">
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    Download PDF
                  </button>
                  <button onClick={() => { setItems([]); setNotes(''); }}
                    className="bg-white/10 text-white font-medium px-5 py-4 rounded-2xl text-sm active:scale-95 transition-transform">
                    Clear
                  </button>
                </div>
              </div>

              <div id="offer-bottom" className="h-4" />
            </>
          )}
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
